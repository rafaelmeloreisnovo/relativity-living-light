falsifier_global: >
  If RLL with ΩB0>0 produces no measurable deviation in DM/rd, DH/rd, or
  validated local magnetic-plasma observables in confirmed off-nuclear BH
  tracers inside the declared redshift window, the magnetic-sector claim is
  rejected for that regime.

operational_usability:
  quick_read: "Three real observational source records are now tabulated, but every record remains claim_allowed=false until raw data, checksum, uncertainty, and baseline exist."
  process_map:
    - "1. Identify candidate and source reference."
    - "2. Record minimal observable numbers in CSV/YML."
    - "3. Fetch raw/archive data into local_path when legally and technically possible."
    - "4. Compute SHA256 and replace TOKEN_VAZIO only with measured checksum."
    - "5. Extract observables with uncertainty model."
    - "6. Compare RLL against ΛCDM/null baseline."
    - "7. Keep claim_allowed=false unless every gate passes."
  failsafe: "Fail closed when raw data, checksum, uncertainty, or baseline is missing."
  rollback: "Revert this ledger or generated readiness JSON; no raw data is deleted by validation."


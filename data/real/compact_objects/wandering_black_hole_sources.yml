# Wandering / Recoiling Black Hole Source Ledger — metadata-ready, claim-blocked
# Generated/updated: 2026-06-27
# Schema: rll.compact_objects.wandering_bh.v1
# Operational stance: TOKEN_VAZIO is intentional where truth is unavailable.

schema_version: "1.0"
claim_allowed: false
status: METADATA_READY_CLAIM_BLOCKED
module: wandering_black_holes_and_lensing_gaps
updated_utc: "2026-06-27"

claim_policy:
  no_superiority: true
  require_checksum: true
  require_baseline_comparison: true
  token_vazio_is_valid: true
  publication_language: >
    Wandering/off-nuclear black holes are independent observational phenomena.
    RLL may only use these records as claim-blocked test targets for whether
    the magnetic sector ΩB0·a^-4 yields a differentiable signature from ΛCDM
    after raw files, checksums, observables, uncertainties, and baseline
    comparisons are present.

falsifier_global: >
  If RLL with ΩB0>0 produces no measurable deviation in DM/rd, DH/rd, or
  validated local magnetic-plasma observables in confirmed off-nuclear BH
  tracers inside the declared redshift window, the magnetic-sector claim is
  rejected for that regime.

operational_usability:
  quick_read: "Every record stays claim_allowed=false until checksum_sha256, raw data, required observables, and baseline comparison are complete."
  process_map:
    - "1. Identify candidate and source reference."
    - "2. Fetch raw or archive data into local_path."
    - "3. Compute SHA256 and replace TOKEN_VAZIO only with measured checksum."
    - "4. Extract observables with uncertainty model."
    - "5. Compare RLL against ΛCDM/null baseline."
    - "6. Keep claim_allowed=false unless every gate passes."
  failsafe: "Fail closed when raw data, checksum, uncertainty, or baseline is missing."
  rollback: "Revert this ledger or generated readiness JSON; no raw data is deleted by validation."


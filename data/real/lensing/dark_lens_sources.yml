      - source_position_shift
      - parallax
      - proper_motion
      - lens_source_separation
      - mass_model
      - uncertainty_model
    physical_parameters:
      alpha_deflect_mas: null
      theta_E_mas: null
      M_lens_msun: null
    validation_link:
      script_expected: scripts/validation/validate_dark_lens_candidates.py
      metric_expected: astrometric_deflection_consistency
      baseline_model: astrometric_lens_baseline
    claim_boundary:
      astrometric_shift_requires_error_model: true
      claim_allowed: false

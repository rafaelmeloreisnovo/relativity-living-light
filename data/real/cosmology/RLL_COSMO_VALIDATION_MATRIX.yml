title: RLL Cosmological Validation Matrix
status: partial_real_preparation
version: 0.1.0
updated_utc: "2026-05-20"
models:
  - id: LCDM
    class: baseline
    free_parameters: [H0, Omega_m, Omega_b, Omega_r, Omega_lambda]
  - id: w0waCDM
    class: comparator
    free_parameters: [H0, Omega_m, w0, wa]
  - id: RLL_1_transition_only
    class: candidate
    free_parameters: [H0, Omega_m, Omega_lambda, Omega_s0, z_t, w_t]
  - id: RLL_2_transition_plus_radiative_terms
    class: candidate
    free_parameters: [H0, Omega_m, Omega_lambda, Omega_s0, z_t, w_t, Omega_B0, Omega_P0]

datasets:
  expansion:
    - DESI_BAO
    - PantheonPlus
    - CosmicChronometers_Hz
  early_universe:
    - Planck_2018_distance_priors
    - ACT_DR6_summary
  growth:
    - BOSS_eBOSS_fs8
    - Euclid_DR1_when_available
    - Rubin_LSST_when_available
  anomaly_stress:
    - JWST_runaway_SMBH_catalog

metrics:
  fit:
    - chi2_total
    - chi2_by_block
    - posterior_predictive_check
  model_selection:
    - AIC
    - BIC
    - delta_AIC_vs_LCDM
    - delta_BIC_vs_LCDM
  robustness:
    - anomaly_penalty
    - covariance_usage_completeness

claims_allowed:
  - "RLL is a testable effective extension"
  - "RLL contains LCDM as limiting case"
  - "RLL can be compared against BAO/SNe/CMB"
claims_forbidden_until_validation:
  - "RLL is confirmed"
  - "negative time proves RLL"
  - "runaway black holes prove dark energy dynamics"

acceptance_criteria:
  - "RLL reproduces LCDM limit when Omega_s0, Omega_B0, Omega_P0 -> 0"
  - "No material degradation against CMB priors"
  - "AIC/BIC not worse than LCDM by publication-threshold margins"
  - "All used covariance blocks recorded with traceability"

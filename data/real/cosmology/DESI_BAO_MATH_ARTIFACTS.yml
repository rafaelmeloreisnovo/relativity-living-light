meta:
  schema: rll.unified.math_artifacts.v2
  title: DESI BAO Mathematical Artifacts for RLL
  status: primary_points_materialized
  updated_utc: "2026-06-01"
  family: math_artifacts
  purpose: "Definições matemáticas uniformes para ingestão e ajuste BAO."

orchestration:
  orchestrator: rll_pipeline
  pipeline_stage: bao_ingestion_and_fit
  module_compatibility: backward_compatible
  fit_modes: [RLL_1_transition_only, RLL_2_transition_plus_radiative_terms, LCDM]

source:
  survey: DESI
  channel: BAO
  release: DESI_DR2_BAO_2025
  paper: "DESI DR2 Results II: Measurements of Baryon Acoustic Oscillations and Cosmological Constraints"
  paper_url: "https://arxiv.org/abs/2503.14738"
  zenodo_doi: "10.5281/zenodo.16644577"
  zenodo_url: "https://zenodo.org/records/16644577"
  local_primary_points: "data/real/cosmology/desi_dr2_bao_primary_points.csv"
  local_covariance_summary: "data/real/cosmology/desi_dr2_bao_covariance_summary.csv"
  note: "Primary compressed DESI DR2 BAO values have been materialized from the official Results II distance table; full-chain reproduction remains delegated to the external DESI/Zenodo supplement."

conventions:
  flat_universe: true
  c_km_s: 299792.458
  scale_factor: "a = 1/(1+z)"

rll_background:
  E2_of_z: >-
    E^2(z)=Omega_r(1+z)^4+Omega_m(1+z)^3+Omega_lambda+
    Omega_s0[f(z)+(1-f(z))(1+z)^3]+Omega_B0(1+z)^4+Omega_P0(1+z)^4
  transition_f_of_z: "f(z)=1/(1+exp((z-z_t)/w_t))"
  H_of_z: "H(z)=H0*sqrt(E2(z))"

bao_observables:
  DM_over_rd: "D_M(z)/r_d"
  DH_over_rd: "D_H(z)/r_d = c/(H(z)r_d)"
  DV_over_rd: "D_V(z)/r_d"
  DM_of_z: "D_M(z)=c*integral_0^z dz'/H(z')"

likelihood:
  chi2: "(D_obs - D_model)^T C^{-1} (D_obs - D_model)"
  blocks_expected: [BAO]

selection_penalties:
  AIC: "AIC = 2K + chi2"
  BIC: "BIC = K*ln(N) + chi2"

artifact_schema:
  required_columns:
    - z
    - observable
    - value
    - sigma
    - covariance_block
  allowed_observables:
    - DM_over_rd
    - DH_over_rd
    - DV_over_rd

materialized_data_products:
  - path: "data/real/cosmology/desi_dr2_bao_primary_points.csv"
    rows: 13
    description: "Primary compressed DESI DR2 BAO likelihood points: BGS DV/rd plus paired DM/rd and DH/rd for LRG1, LRG2, LRG3+ELG1, ELG2, QSO, and Ly-alpha."
  - path: "data/real/cosmology/desi_dr2_bao_covariance_summary.csv"
    rows: 6
    description: "Per-bin correlation and covariance terms computed from published sigma values and r_M,H coefficients."

next_actions:
  - "Replace covariance_summary with the full official covariance matrix when a lightweight machine-readable DESI extract is vendored or generated from Zenodo."
  - "Run fit script and store chi2/AIC/BIC in results/ with explicit DESI_DR2_BAO_2025 provenance."
  - "Keep DR1 and DR2 likelihoods separated because DR1 is a subset of DR2."

mapping:
  artifact_diff_log: "results/mapping_logs/desi_bao_artifacts_diff.log"
  ingestion_trace_log: "results/mapping_logs/desi_bao_ingestion_trace.log"

# Operational documentation consumers for metadata-only YAML.
consumed_by:
  - tools/generate_yml_audit_docs.py
  - tools/docs_inventory.py
  - docs/yml/YML_PIPELINE_EXECUTION_READINESS.md

# w_eff(z) RLL → mapping in the w0-wa CPL plane
# Generated: 2026-06-27 | ∆RafaelVerboΩ | RAFCODE-Φ
# Schema: rll.weff_cpl_mapping.v1

schema_version: "1.0"
module: weff_cpl_plane_mapping
status: CALCULATED_PARTIAL_CLAIM_BLOCKED
claim_allowed: false
updated_utc: "2026-06-27"

background:
  desi_dr2_cpl_reference:
    source: "DESI DR2 BAO cosmology paper / official DESI DR2 guide"
    verified_claim: "DESI DR2 reports preference for w0 > -1 and wa < 0, with ~3.1σ over ΛCDM for DESI BAO+CMB."
    exact_table_values_status: TOKEN_VAZIO
    note: "Do not hard-code final official best-fit values unless the exact table row and data combination are locally ingested."
  user_seed_cpl_target:
    w0: -0.838
    wa: -0.62
    status: USER_PROVIDED_TARGET_CLAIM_BLOCKED
    note: "Used only as a numerical mapping target, not as a repository-certified DESI value. The supplied table follows w_target(z)=w0-wa*z/(1+z) sign convention."
  repo_joint_real_warning:
    source: "results/structure_d/joint_real_likelihood.json"
    note: "Any H₀=60 boundary solution should be treated as a grid artifact until h0_grid_expansion passes."

calculated_weff_rll_seed:
  parameters:
    Om: 0.315
    Os0: 0.02
    zt: 1.0
    wt: 0.3
  table:
    - {z: 0.000, w_eff: -0.9656, f_z: 0.9656, w_cpl_target: -0.838}
    - {z: 0.100, w_eff: -0.9199, f_z: 0.9526, w_cpl_target: -0.776}
    - {z: 0.295, w_eff: -0.7641, f_z: 0.9145, w_cpl_target: -0.671}
    - {z: 0.510, w_eff: -0.3289, f_z: 0.8481, w_cpl_target: -0.558}
    - {z: 0.706, w_eff: 0.3671, f_z: 0.7271, w_cpl_target: -0.459}
    - {z: 0.934, w_eff: 0.7294, f_z: 0.5548, w_cpl_target: -0.354}
    - {z: 1.000, w_eff: 0.7531, f_z: 0.5000, w_cpl_target: -0.328}
    - {z: 1.321, w_eff: 0.5631, f_z: 0.2554, w_cpl_target: -0.210}
    - {z: 1.484, w_eff: 0.4451, f_z: 0.1691, w_cpl_target: -0.156}
    - {z: 2.330, w_eff: 0.0419, f_z: 0.0117, w_cpl_target: 0.055}

diagnosis:
  problem: >
    The seed RLL trajectory becomes matter-like at z≈0.7–1.3 while the supplied
    CPL target remains negative in the same range. This is a trajectory-shape
    mismatch, not evidence for a successful mapping.
  root_cause: >
    With Os0=0.02 and zt=1.0, the superposition transition migrates toward
    matter-like behavior in the DESI tracer redshift window.
  solution_A: "Scan zt≈0.3–0.5 and Os0≈0.06–0.10 to test earlier transition shapes."
  solution_B: "Treat ΩB0/ΩP0 only as future degrees of freedom after a baseline CPL fit is reproduced."

execution:
  script: "scripts/compute_weff_cpl_mapping.py"
  command: >
    python scripts/compute_weff_cpl_mapping.py
      --out-csv results/weff_cpl_plane_rll.csv
      --out-json results/weff_cpl_plane_rll_summary.json

falsifiers:
  - id: F_WEFF_01
    test: "Does any scanned (zt, wt) approximate the target CPL curve over all tracers?"
    metric: "chi2_weff_vs_cpl < 10.0"
    if_true: "RLL remains a candidate parameterization for this target curve."
    if_false: "RLL does not reproduce the target CPL trajectory under this restricted sector."
  - id: F_WEFF_02
    test: "Present-day effective equation of state must remain dark-energy-like."
    metric: "w_eff(z=0) < -0.7"
    if_fails: "Superposition sector does not act like dark energy today."
  - id: F_WEFF_03
    test: "The scan should report monotonicity instead of hiding shape instabilities."
    metric: "monotonic_z0_to_zt is explicit in JSON output"
    if_fails: "Mapping lacks stability diagnostics."

quality_gates:
  gate_1_source_boundary: "Official DESI exact best-fit values remain TOKEN_VAZIO until table provenance is ingested."
  gate_2_falsifier: "Summary JSON must expose pass/fail for F_WEFF_01..03."
  gate_3_rollback: "Outputs are deterministic and reproducible from the script."

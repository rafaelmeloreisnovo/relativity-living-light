# Real Observational Seed Catalog v1
# Status: external_only_seed_supplement
# Purpose: add more real mappable observational anchors across compact remnants, dormant black holes, slingshot kinematics, residual structure, and high-z SMBH growth.
# Claim policy: seed data only; not raw-catalog ingestion and not final validation.

schema_version: 0.1
status: external_only_seed_supplement
claim_allowed: false
created_context: mapped_real_data_expansion_for_RLL_bootstrap
extends:
  - data/real/bootstrap/real_observational_seed_v0.yml
linked_docs:
  - docs/science/REAL_DATA_BOOTSTRAP_VALIDATION_SYSTEM.md
  - docs/science/REAL_OBSERVATIONAL_SEED_V0_REPORT.md
  - docs/science/REAL_SEED_VALIDATION_V0_INDEX.md
  - docs/science/DATA_GAP_SCAN_AND_STRUCTURE_LINKAGE.md

source_policy:
  raw_data_local: false
  local_checksum_status: not_applicable_external_only
  interpretation_status: seed_record_only
  require_future_raw_catalog_ingestion: true
  require_future_metric_before_claim: true
  global_claim_allowed: false


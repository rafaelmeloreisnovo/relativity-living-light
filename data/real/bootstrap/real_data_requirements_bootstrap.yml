# Real Data Requirements Bootstrap
# Status: initial structured absence ledger
# Purpose: define the minimum real-data sources required before RLL hypothesis modules can be validated by calculation.

schema_version: 0.1
claim_allowed: false
status: bootstrap_scaffold
linked_docs:
  - docs/science/REAL_DATA_BOOTSTRAP_VALIDATION_SYSTEM.md
  - docs/science/DATA_GAP_SCAN_AND_STRUCTURE_LINKAGE.md

claim_boundary:
  require_real_source: true
  require_checksum_for_local_data: true
  require_metric: true
  require_baseline: true
  require_error_model: true
  require_machine_output: true
  no_superiority_claim_from_token_vazio: true

modules:
  - id: cosmology_background
    purpose: compare RLL against LCDM/wCDM/CPL using real cosmological observables
    required_ledgers:
      - data/observational_sources.yml
      - validacao_real/sources.yml
      - data/real/rll_real_sources_manifest_2026.yml
    required_observables:
      - BAO
      - H_z
      - Pantheon_plus_SNe
      - Planck_CMB
      - fsigma8
    required_metrics:
      - chi2
      - AIC
      - AICc
      - BIC
      - covariance_aware_likelihood
    baseline_models:
      - LCDM
      - wCDM
      - CPL_w0waCDM
    expected_output: data/results/cosmology/model_comparison.json
    status: blocked
    claim_allowed: false

  - id: compact_remnant_boundary
    purpose: validate neutron-star / mass-gap / black-hole transition boundaries
    required_ledgers:
      - data/real/compact_objects/remnant_boundary_sources.yml
    required_observables:
      - compact_object_mass
      - mass_uncertainty
      - radius_if_available
      - spin_if_available
      - object_class
      - measurement_method
    required_metrics:
      - mass_gap_classification
      - baseline_consistency
      - uncertainty_overlap
    baseline_models:
      - neutron_star_EOS_limits
      - stellar_black_hole_catalog_baseline
      - gravitational_wave_catalog_baseline
    expected_output: data/results/compact_objects/remnant_boundary_validation.json
    status: TOKEN_VAZIO
    claim_allowed: false

  - id: wandering_black_holes
    purpose: validate wandering, recoiling, silent, or dark-lens compact mass candidates
    required_ledgers:
      - data/real/compact_objects/wandering_black_hole_sources.yml
    required_observables:
      - mass_estimate
      - lensing_signature
      - stellar_kinematics
      - accretion_state
      - luminous_counterpart_search
      - alternative_models
    required_metrics:
      - lensing_mass_consistency
      - kinematic_mass_consistency
      - accretion_upper_limit_consistency
    baseline_models:
      - non_black_hole_lens_model
      - stellar_remnant_model
      - dark_matter_subhalo_model
    expected_output: data/results/compact_objects/wandering_bh_validation.json
    status: TOKEN_VAZIO
    claim_allowed: false

  - id: residual_gravity_structures
    purpose: validate residual gravitational structures, orphan halos, disrupted galaxies, and historical impulse signatures
    required_ledgers:
      - data/real/structure/residual_gravity_sources.yml
    required_observables:
      - stellar_velocities
      - stellar_streams
      - lensing_mass
      - dark_matter_halo_inference
      - proper_motion
      - radial_velocity
      - environment
    required_metrics:
      - residual_mass_consistency
      - trajectory_traceback_consistency
      - lensing_kinematic_agreement
    baseline_models:
      - tidal_disruption_model
      - galaxy_merger_model
      - orphan_halo_model
    expected_output: data/results/structure/residual_gravity_validation.json
    status: TOKEN_VAZIO
    claim_allowed: false

  - id: historical_impulse_slingshot
    purpose: validate whether an object preserves kinematic memory of a past gravitational encounter
    required_ledgers:
      - data/real/kinematics/hypervelocity_sources.yml
    required_observables:
      - proper_motion
      - radial_velocity
      - origin_trace
      - Delta_v
      - t_enc
      - encounter_model
    required_metrics:
      - traceback_probability
      - escape_velocity_consistency
      - slingshot_energy_transfer
    baseline_models:
      - Hills_mechanism
      - three_body_scattering
      - gravitational_wave_recoil
    expected_output: data/results/kinematics/historical_impulse_validation.json
    status: TOKEN_VAZIO
    claim_allowed: false

  - id: high_z_smbh_seeds
    purpose: validate early supermassive black-hole seed constraints and growth feasibility
    required_ledgers:
      - data/real/high_z_smbh/high_z_seed_sources.yml
    required_observables:
      - redshift
      - black_hole_mass
      - luminosity
      - accretion_assumption
      - host_galaxy_constraints
    required_metrics:
      - eddington_growth_feasibility
      - seed_mass_requirement
      - formation_channel_consistency
    baseline_models:
      - light_seed_model
      - heavy_seed_model
      - direct_collapse_model
      - merger_growth_model
    expected_output: data/results/high_z_smbh/seed_validation.json
    status: TOKEN_VAZIO
    claim_allowed: false

bootstrap_outputs:
  summary_json: data/results/bootstrap/real_data_bootstrap_summary.json
  ledger_tsv: data/results/bootstrap/real_data_bootstrap_ledger.tsv
  report_md: docs/science/REAL_DATA_BOOTSTRAP_SCAN_REPORT.md

scan_policy:
  fail_closed_if_missing_ledger: true
  fail_closed_if_token_vazio: true
  fail_closed_if_missing_checksum_for_local_data: true
  fail_closed_if_missing_metric: true
  fail_closed_if_missing_baseline: true
  allow_external_only_reference: true

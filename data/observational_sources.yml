meta:
  schema: rll.unified.catalog.v2
  version: 2
  updated_utc: "2026-06-01"
  family: source_catalog
  purpose: "Catálogo unificado de fontes observacionais com foco em rastreabilidade."

orchestration:
  orchestrator: rll_pipeline
  pipeline_stage: source_selection
  module_compatibility: backward_compatible
  selection_keys: [domain, modality, release_status, language_scope]

catalog:
  desi_2025:
    label: "DESI collaboration updates (dark-energy evolution hints)"
    type: collaboration_release
    domain: cosmology
    modality: bao
    release_status: active
    language_scope: [en]
    url: "https://www.desi.lbl.gov/"
    usage: "BAO expansion constraints and survey context"

  desi_dr2_bao_2025:
    label: "DESI DR2 BAO measurements and cosmological constraints"
    type: data_release
    domain: cosmology
    modality: bao
    release_status: active
    evidence_level: real_validated
    language_scope: [en]
    url: "https://data.desi.lbl.gov/doc/papers/dr2/"
    paper_url: "https://arxiv.org/abs/2503.14738"
    zenodo_doi: "10.5281/zenodo.16644577"
    zenodo_url: "https://zenodo.org/records/16644577"
    local_primary_points: "data/real/cosmology/desi_dr2_bao_primary_points.csv"
    local_covariance_summary: "data/real/cosmology/desi_dr2_bao_covariance_summary.csv"
    usage: "Primary 2025 DESI DR2 BAO distance-ratio constraints for expansion-history likelihoods"
    observation_scope:
      years_of_operation: 3
      tracers_reported: [BGS, LRG, ELG, QSO, Lya]
      redshift_range: [0.295, 2.330]
      primary_likelihood_points: 13

  desi_dr2_zenodo_supplement_2025:
    label: "DESI DR2 Results II supplementary data"
    type: zenodo_dataset
    domain: cosmology
    modality: bao
    release_status: active
    evidence_level: real_validated
    language_scope: [en]
    url: "https://zenodo.org/records/16644577"
    doi: "10.5281/zenodo.16644577"
    license: "CC-BY-4.0"
    usage: "Reproduction archive for DESI DR2 BAO figures, chains, and numerical results; use as canonical external supplement rather than copying the full 1.3 GB archive into git"

  pantheon_plus:
    label: "Pantheon+ Type Ia supernova release"
    type: data_release
    domain: cosmology
    modality: supernovae
    release_status: active
    language_scope: [en]
    url: "https://github.com/PantheonPlusSH0ES/DataRelease"
    usage: "SN distance-modulus likelihood block"

  planck_2018_parameters:
    label: "Planck 2018 cosmological parameters"
    type: journal
    domain: cosmology
    modality: cmb
    release_status: stable
    language_scope: [en]
    url: "https://arxiv.org/abs/1807.06209"
    usage: "ΛCDM baseline and early-universe consistency priors"

  act_dr6:
    label: "ACT DR6 cosmological parameters"
    type: journal
    domain: cosmology
    modality: cmb
    release_status: active
    language_scope: [en]
    url: "https://arxiv.org/abs/2307.01258"
    usage: "Independent CMB consistency check with Planck"

  negative_weak_time:
    label: "Negative weak value of dwell time in light-matter system"
    type: journal
    domain: quantum_concepts
    modality: conceptual_bridge
    release_status: exploratory
    language_scope: [en]
    url: "https://arxiv.org/abs/2509.03152"
    usage: "Operational-time conceptual bridge only"

  euclid_mission:
    label: "Euclid mission public portal"
    type: mission
    domain: cosmology
    modality: growth_lensing
    release_status: upcoming
    language_scope: [en]
    url: "https://www.euclid-ec.org/"
    usage: "Forthcoming growth/lensing constraints"

  rubin_observatory:
    label: "Vera C. Rubin Observatory"
    type: observatory
    domain: cosmology
    modality: lsst_transients
    release_status: upcoming
    language_scope: [en]
    url: "https://rubinobservatory.org/"
    usage: "LSST-era growth, transients, and lensing"

  jwst_runaway_smbh:
    label: "Runaway SMBH candidate with JWST/NIRSpec"
    type: journal
    domain: anomaly_stress
    modality: astrophysical_anomaly
    release_status: active
    language_scope: [en]
    url: "https://arxiv.org/abs/2303.12788"
    usage: "Anomaly-robustness stress testing"

mapping:
  catalog_diff_log: "results/mapping_logs/observational_sources_diff.log"
  selection_trace_log: "results/mapping_logs/source_selection_trace.log"

# Operational documentation consumers for metadata-only YAML.
consumed_by:
  - tools/generate_yml_audit_docs.py
  - tools/docs_inventory.py
  - docs/yml/YML_PIPELINE_EXECUTION_READINESS.md

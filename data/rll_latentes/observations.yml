    license: "CC-BY-4.0"
    current_relevance: "Reproduces figures and numerical results for DESI DR2 BAO cosmological constraints."
    falsifiable_latent_tests:
      - "Compare RLL-LATENTES scores under DESI DR2 covariance vs. independent likelihood choices."

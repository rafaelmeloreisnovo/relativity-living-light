  For cosmology axes: LCDM, wCDM and CPL/w0waCDM. For formal proof axes:
  derivation-required baseline. For graph/chaos axes: synthetic null model and
  stability/recurrence baseline.
uncertainty_or_covariance_status: TOKEN_VAZIO_UNCERTAINTY_FOR_NUMERICAL_AXES
contradiction_check: TOKEN_VAZIO_CONTRADICTION_CHECK
reproducibility_command: TOKEN_VAZIO_COMMAND
claim_allowed: false
claim_blocked:
  - unsupported_claim_promotion
  - academic_correlation_as_scientific_validation
  - heuristic_relation_as_proof
  - proof_without_derivation
next_gate: >-
  Add schema and validator for academic correlation packages, then materialize
  one tested axis with source paths, metrics, baseline/adversary, contradiction
  check, uncertainty status and reproducibility command.

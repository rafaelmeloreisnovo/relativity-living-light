name: Real Data Bootstrap Validation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Validation mode"
        required: true
        type: choice
        default: scan
        options:
          - scan
          - strict
  pull_request:
    paths:
      - "data/real/**"
      - "docs/science/**"
      - "scripts/data_scan/**"
      - ".github/workflows/real-data-bootstrap-validation.yml"
  push:
    paths:
      - "data/real/**"
      - "docs/science/**"
      - "scripts/data_scan/**"
      - ".github/workflows/real-data-bootstrap-validation.yml"

permissions:
  contents: read

concurrency:
  group: real-data-bootstrap-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan-real-data-bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository state
        run: |
          git rev-parse HEAD
          git status --short

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install YAML parser
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Compile scanner
        run: |
          python -m py_compile scripts/data_scan/scan_real_data_bootstrap.py

      - name: Run real-data bootstrap scan
        run: |
          python scripts/data_scan/scan_real_data_bootstrap.py --repo .

      - name: Display scan summary
        run: |
          cat data/results/bootstrap/real_data_bootstrap_summary.json
          echo "---"
          cat docs/science/REAL_DATA_BOOTSTRAP_SCAN_REPORT.md

      - name: Upload bootstrap scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real-data-bootstrap-scan
          path: |
            data/results/bootstrap/real_data_bootstrap_summary.json
            data/results/bootstrap/real_data_bootstrap_ledger.tsv
            docs/science/REAL_DATA_BOOTSTRAP_SCAN_REPORT.md

      - name: Strict mode claim gate
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'strict' }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path('data/results/bootstrap/real_data_bootstrap_summary.json')
          data = json.loads(p.read_text())
          if data.get('missing_ledgers', 0) or data.get('blocked_ledgers', 0):
              raise SystemExit('Strict mode failed: missing or blocked ledgers remain. No claim allowed.')
          if data.get('claim_allowed') is not True:
              raise SystemExit('Strict mode failed: global claim_allowed is not true.')
          PY

name: RLL Real Data Orchestrator

on:
  workflow_dispatch:
    inputs:
      pipeline_scope:
        description: Domain to process
        type: choice
        required: true
        default: all
        options: [rll, iml, formulas, book, all]
      dataset_group:
        description: Real-data group to process
        type: choice
        required: true
        default: all
        options: [geomagnetic, heliophysics, cosmology, all]
      mode:
        description: Processing mode
        type: choice
        required: true
        default: full
        options: [metadata_only, fetch, compute, plots, full]
      real_data_source:
        description: Source for real inputs
        type: choice
        required: true
        default: repo
        options: [materialized, repo]
      retention_days:
        description: Artifact retention days
        type: choice
        required: true
        default: "14"
        options: ["7", "14", "30", "90"]
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  RUN_DIR: artifacts/rll-real-run
  CLAIM_BOUNDARY: "Provenance and reproducibility only; no automatic scientific endorsement or superiority claim."
  CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install numpy pandas scipy matplotlib requests astropy pyyaml

      - name: Prepare fixed artifact layout
        run: |
          set -euo pipefail
          rm -rf "$RUN_DIR"
          mkdir -p "$RUN_DIR"/{raw,processed,tables,plots,reports,diagnostics,book}
          date -u +"%Y-%m-%dT%H:%M:%SZ" > "$RUN_DIR/RUN_UTC.txt"
          git rev-parse HEAD > "$RUN_DIR/COMMIT_SHA.txt"
          printf '%s\n' "$CLAIM_BOUNDARY" > "$RUN_DIR/CLAIM_BOUNDARY.md"

      - name: Block placeholder inputs and record real-input hashes
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import re
          from pathlib import Path

          candidates = [
              Path("data/real/Hz_data_real.csv"),
              Path("data/real/BAO_data_real.csv"),
              Path("data/real/CMB_shift_real.json"),
          ]
          forbidden = re.compile(r"mock|synthetic|fixture|demo|example|placeholder", re.I)
          records = []
          for path in candidates:
              if not path.is_file() or path.stat().st_size == 0:
                  raise SystemExit(f"required real input missing or empty: {path}")
              text = path.read_text(encoding="utf-8", errors="replace")
              if forbidden.search(str(path)) or forbidden.search(text):
                  raise SystemExit(f"placeholder-like content rejected: {path}")
              records.append({
                  "path": str(path),
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                  "bytes": path.stat().st_size,
              })
          output = Path("artifacts/rll-real-run/raw/REAL_INPUTS.json")
          output.write_text(json.dumps({
              "schema": "rll.real_inputs.v1",
              "source": "committed repository real-data inputs",
              "records": records,
              "claim_boundary": "Input provenance only; no scientific endorsement.",
          }, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Refresh and validate repository inventory
        run: |
          set -euo pipefail
          python tools/docs_inventory.py | tee "$RUN_DIR/diagnostics/docs_inventory_refresh.log"
          python tools/docs_inventory.py --check | tee "$RUN_DIR/diagnostics/docs_inventory_check.log"

      - name: Hotfix gate - rll
        if: ${{ inputs.pipeline_scope == 'rll' || inputs.pipeline_scope == 'all' || github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          test -s data/real/Hz_data_real.csv
          test -s data/real/BAO_data_real.csv
          printf '%s\n' "rll hotfix: real H(z) and BAO inputs present and non-empty" > "$RUN_DIR/diagnostics/hotfix_rll.status"

      - name: Hotfix gate - iml
        if: ${{ inputs.pipeline_scope == 'iml' || inputs.pipeline_scope == 'all' || github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          test -s data/real/Hz_data_real.csv
          printf '%s\n' "iml hotfix: real H(z) input present and non-empty" > "$RUN_DIR/diagnostics/hotfix_iml.status"

      - name: Hotfix gate - formulas
        if: ${{ inputs.pipeline_scope == 'formulas' || inputs.pipeline_scope == 'all' || github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          test -s data/real/Hz_data_real.csv
          python tools/formula_artifact_builder.py --outdir "$RUN_DIR/processed/formulas"
          printf '%s\n' "formulas hotfix: formula artifact generation passed" > "$RUN_DIR/diagnostics/hotfix_formulas.status"

      - name: Hotfix gate - book
        if: ${{ inputs.pipeline_scope == 'book' || inputs.pipeline_scope == 'all' || github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          test -d docs
          test -s "$RUN_DIR/CLAIM_BOUNDARY.md"
          printf '%s\n' "book hotfix: documentation and claim boundary present" > "$RUN_DIR/diagnostics/hotfix_book.status"

      - name: Fetch declared real sources
        if: ${{ inputs.mode == 'fetch' || inputs.mode == 'full' || github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          python scripts/fetch_real_sources.py \
            --dataset-group "${{ inputs.dataset_group || 'all' }}" \
            --mode "${{ inputs.mode || 'full' }}" \
            --output-dir "$RUN_DIR" \
            --no-fetch-igrf14 --no-fetch-wmm2025 --no-fetch-omni --no-fetch-nmdb \
            --no-fetch-desi --no-fetch-pantheon --no-fetch-planck --no-fetch-spenvis-reference

      - name: Compute RLL real pipeline
        if: ${{ inputs.mode == 'compute' || inputs.mode == 'plots' || inputs.mode == 'full' || github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          python scripts/compute_rll_real_pipeline.py \
            --output-dir "$RUN_DIR" \
            --data-source "${{ inputs.real_data_source || 'repo' }}"

      - name: real_3_compute - independent blocks and grouped consolidation
        if: ${{ inputs.mode == 'compute' || inputs.mode == 'plots' || inputs.mode == 'full' || github.event_name == 'schedule' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import hashlib
          import json
          import statistics
          from pathlib import Path

          root = Path("artifacts/rll-real-run")
          raw = root / "raw"
          diagnostics = root / "diagnostics"
          reports = root / "reports"
          diagnostics.mkdir(parents=True, exist_ok=True)
          reports.mkdir(parents=True, exist_ok=True)

          def write_block(name, payload):
              payload["block"] = name
              payload["status"] = "pass"
              (diagnostics / f"real_3_{name}.json").write_text(
                  json.dumps(payload, indent=2) + "\n", encoding="utf-8"
              )
              return payload

          hz = Path("data/real/Hz_data_real.csv")
          with hz.open(encoding="utf-8", newline="") as handle:
              hz_rows = list(csv.DictReader(handle))
          block_hz = write_block("hz", {
              "group": "cosmology",
              "rows": len(hz_rows),
              "mean_H_obs": statistics.fmean(float(row["H_obs"]) for row in hz_rows),
              "sha256": hashlib.sha256(hz.read_bytes()).hexdigest(),
          })

          bao = Path("data/real/BAO_data_real.csv")
          with bao.open(encoding="utf-8", newline="") as handle:
              bao_rows = list(csv.DictReader(handle))
          block_bao = write_block("bao", {
              "group": "cosmology",
              "rows": len(bao_rows),
              "mean_DV_over_rs": statistics.fmean(float(row["DV_over_rs"]) for row in bao_rows),
              "sha256": hashlib.sha256(bao.read_bytes()).hexdigest(),
          })

          cmb = Path("data/real/CMB_shift_real.json")
          cmb_payload = json.loads(cmb.read_text(encoding="utf-8"))
          block_cmb = write_block("cmb", {
              "group": "cosmology",
              "keys": sorted(cmb_payload) if isinstance(cmb_payload, dict) else [],
              "sha256": hashlib.sha256(cmb.read_bytes()).hexdigest(),
          })

          summary = {
              "schema": "rll.real_3_summary.v1",
              "phase": "real_3_compute",
              "status": "pass",
              "groups": {
                  "cosmology": {
                      "status": "pass",
                      "independent_blocks": [block_hz, block_bao, block_cmb],
                      "consolidation": "all three independent real-input blocks passed",
                  }
              },
              "claim_boundary": "Computed summaries are provenance and reproducibility artifacts; no automatic scientific endorsement.",
          }
          (reports / "real_3_summary.json").write_text(
              json.dumps(summary, indent=2) + "\n", encoding="utf-8"
          )
          PY

      - name: Run selected IML pipeline
        if: ${{ (inputs.pipeline_scope == 'iml' || inputs.pipeline_scope == 'all') && (inputs.mode == 'compute' || inputs.mode == 'full') }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv, hashlib, json
          from pathlib import Path
          source = Path("data/real/Hz_data_real.csv")
          rows = list(csv.DictReader(source.open(encoding="utf-8", newline="")))
          if not rows:
              raise SystemExit("real H(z) source is empty")
          payload = {
              "dados": [round(float(row["H_obs"]) * 10) for row in rows],
              "redshift_milli": [round(float(row["z"]) * 1000) for row in rows],
              "data_source": str(source),
              "data_source_sha256": hashlib.sha256(source.read_bytes()).hexdigest(),
              "claim_boundary": "Input provenance only; no scientific endorsement.",
          }
          output = Path("artifacts/rll-real-run/processed/iml/input.json")
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
          python tools/iml/iml_pipeline.py \
            --input "$RUN_DIR/processed/iml/input.json" \
            --output "$RUN_DIR/processed/iml/output.json"

      - name: Run selected book pipeline
        if: ${{ inputs.pipeline_scope == 'book' || inputs.pipeline_scope == 'all' }}
        run: |
          set -euo pipefail
          python scripts/rll_pipeline.py \
            --book-scope all \
            --dataset-group "${{ inputs.dataset_group || 'all' }}" \
            --mode "${{ inputs.mode || 'full' }}" \
            --output-dir "$RUN_DIR/book"

      - name: Finalize manifest and checksums
        if: always()
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path("artifacts/rll-real-run")
          files = sorted(str(path.relative_to(root)) for path in root.rglob("*") if path.is_file())
          required_dirs = ["raw", "processed", "tables", "plots", "reports", "diagnostics", "book"]
          manifest = {
              "schema": "rll.real_data_orchestrator.v2",
              "run_id": "${{ github.run_id }}",
              "commit_sha": "${{ github.sha }}",
              "required_layout": required_dirs,
              "files": files,
              "claim_boundary": "Provenance and reproducibility only; no automatic scientific endorsement or superiority claim.",
              "promotion": "blocked when any critical hotfix or real-input gate fails",
          }
          (root / "MANIFEST.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY
          find "$RUN_DIR" -type f ! -name CHECKSUMS.sha256 -print0 | sort -z | xargs -0 sha256sum > "$RUN_DIR/CHECKSUMS.sha256"

      - name: Finalize canonical policy checksum
        if: always()
        run: |
          set -euo pipefail
          policy_dir="artifacts/workflow-policy/rll-real-data-orchestrator/${{ github.job }}"
          mkdir -p "$policy_dir"
          . tools/ci/real_data_workflow_policy.sh
          rll_real_data_write_claim_boundary "$policy_dir"
          rll_real_data_assert_boundary_file "$policy_dir/CLAIM_BOUNDARY.md"
          rll_real_data_write_checksums "$policy_dir"

      - name: Upload versioned real-data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rll-real-run-${{ github.run_id }}
          path: artifacts/rll-real-run/
          retention-days: ${{ fromJSON(inputs.retention_days || '14') }}

      - name: Upload policy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rll-real-policy-${{ github.run_id }}
          path: artifacts/workflow-policy/rll-real-data-orchestrator/${{ github.job }}/
          retention-days: ${{ fromJSON(inputs.retention_days || '14') }}

x-canonical-real-data-policy: Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.

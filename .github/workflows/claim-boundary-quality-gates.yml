name: Claim Boundary Quality Gates

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "data/**"
      - "docs/science/**"
      - "scripts/validation/**"
      - "tests/**"
      - ".github/workflows/claim-boundary-quality-gates.yml"
  push:
    paths:
      - "data/**"
      - "docs/science/**"
      - "scripts/validation/**"
      - "tests/**"
      - ".github/workflows/claim-boundary-quality-gates.yml"

permissions:
  contents: read

concurrency:
  group: claim-boundary-quality-gates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  claim-boundary-quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile validation scripts
        run: |
          python -m py_compile scripts/validation/check_claim_boundary.py
          python -m py_compile scripts/validation/check_seed_artifact_contracts.py
          python -m py_compile scripts/validation/real_seed_utils.py
          python -m py_compile scripts/validation/validate_orbital_shape_angular_momentum.py

      - name: Run claim boundary gate
        run: |
          python scripts/validation/check_claim_boundary.py

      - name: Run artifact contract checks
        run: |
          python scripts/validation/check_seed_artifact_contracts.py

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run unit tests
        run: |
          python -m pytest -q tests

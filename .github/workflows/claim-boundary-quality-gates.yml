# Auxiliary real-data workflow. Canonical policy: .github/workflows/real-data-complete-execution.yml
name: Claim Boundary Quality Gates
on:
  workflow_dispatch: null
  pull_request:
    paths:
    - data/**
    - docs/science/**
    - scripts/validation/**
    - tests/**
    - .github/workflows/claim-boundary-quality-gates.yml
  push:
    paths:
    - data/**
    - docs/science/**
    - scripts/validation/**
    - tests/**
    - .github/workflows/claim-boundary-quality-gates.yml
permissions:
  contents: read
concurrency:
  group: claim-boundary-quality-gates-${{ github.ref }}
  cancel-in-progress: false
jobs:
  claim-boundary-quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install package and test dependencies
      run: 'python -m pip install --upgrade pip

        python -m pip install -e .

        python -m pip install pytest

        '
    - name: Compile validation scripts
      run: 'python -m py_compile scripts/validation/check_claim_boundary.py

        python -m py_compile scripts/validation/check_seed_artifact_contracts.py

        python -m py_compile scripts/validation/real_seed_utils.py

        python -m py_compile scripts/validation/validate_orbital_shape_angular_momentum.py

        '
    - name: Run claim boundary gate
      run: 'python scripts/validation/check_claim_boundary.py

        '
    - name: Run artifact contract checks
      run: 'python scripts/validation/check_seed_artifact_contracts.py

        '
    - name: Run unit tests
      run: 'python -m pytest -q tests

        '
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/claim-boundary-quality-gates/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    - name: Upload canonical real-data policy artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: claim-boundary-quality-gates-policy-${{ github.run_id }}-${{ github.job }}
        path: artifacts/workflow-policy/claim-boundary-quality-gates/${{ github.job }}/
        retention-days: '14'
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
x-canonical-real-data-policy: Auxiliary real-data workflow; canonical policy is .github/workflows/real-data-complete-execution.yml. Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.

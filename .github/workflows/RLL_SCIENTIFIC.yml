name: RLL Scientific Validation Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rll-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pandas matplotlib emcee astropy corner getdist

      - name: Load cosmological datasets
        run: |
          python validation/load_data.py

      - name: Run ΛCDM baseline fit
        run: |
          python validation/run_lcdm.py --output validation_outputs/lcdm.json

      - name: Run RLL model (𝓡 = ΛCDM + β·𝓘)
        run: |
          python validation/run_rll.py --output validation_outputs/rll.json

      - name: Statistical comparison (χ² / AIC / BIC)
        run: |
          python validation/compare_models.py \
            --lcdm validation_outputs/lcdm.json \
            --rll validation_outputs/rll.json \
            --output validation_outputs/comparison.json

      - name: Generate report plots
        run: |
          python validation/plot_results.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rll-validation-results
          path: validation_outputs/

      - name: Fail pipeline if RLL is invalid
        run: |
          python validation/check_falsification.py

name: RLL Scientific Validation Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rll-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pandas matplotlib emcee astropy corner getdist

      - name: Load cosmological datasets
        run: |
          python -m validation.load_data

      - name: Run LCDM baseline fit
        run: |
          python -m validation.run_lcdm --output validation_outputs/lcdm.json

      - name: Run RLL model
        run: |
          python -m validation.run_rll --output validation_outputs/rll.json

      - name: Statistical comparison
        run: |
          python -m validation.compare_models \
            --lcdm validation_outputs/lcdm.json \
            --rll validation_outputs/rll.json \
            --output validation_outputs/comparison.json

      - name: Generate report plots
        run: |
          python -m validation.plot_results

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rll-validation-results
          path: validation_outputs/

      - name: Fail pipeline if RLL is invalid
        run: |
          python -m validation.check_falsification

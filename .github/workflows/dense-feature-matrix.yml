# Auxiliary real-data workflow. Canonical policy: .github/workflows/real-data-complete-execution.yml
name: Dense Feature Matrix
on:
  workflow_dispatch: null
  pull_request:
    paths:
    - data/results/bootstrap/real_seed_ingestion_plan.json
    - data/results/orbital_dynamics/angular_momentum_shape_validation.json
    - data/results/bootstrap/token_vazio_priority_ledger.json
    - data/results/negative_results_ledger.json
    - data/real/bootstrap/dense_behavior_feature_orchestration.yml
    - scripts/data_scan/build_dense_behavior_features.py
    - .github/workflows/dense-feature-matrix.yml
  push:
    paths:
    - data/results/bootstrap/real_seed_ingestion_plan.json
    - data/results/orbital_dynamics/angular_momentum_shape_validation.json
    - data/results/bootstrap/token_vazio_priority_ledger.json
    - data/results/negative_results_ledger.json
    - data/real/bootstrap/dense_behavior_feature_orchestration.yml
    - scripts/data_scan/build_dense_behavior_features.py
    - .github/workflows/dense-feature-matrix.yml
permissions:
  contents: read
concurrency:
  group: dense-feature-matrix-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build-dense-feature-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.x
    - name: Compile builder
      run: 'python -m py_compile scripts/data_scan/build_dense_behavior_features.py

        '
    - name: Build dense feature matrix
      run: 'python scripts/data_scan/build_dense_behavior_features.py

        '
    - name: Display dense feature report
      run: 'cat docs/science/DENSE_BEHAVIOR_FEATURES_REPORT.md

        '
    - name: Upload dense feature artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dense-feature-matrix
        path: 'data/results/bootstrap/dense_behavior_features.json

          data/results/bootstrap/dense_behavior_features.tsv

          docs/science/DENSE_BEHAVIOR_FEATURES_REPORT.md

          '
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/dense-feature-matrix/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
x-canonical-real-data-policy: Auxiliary real-data workflow; canonical policy is .github/workflows/real-data-complete-execution.yml. Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.

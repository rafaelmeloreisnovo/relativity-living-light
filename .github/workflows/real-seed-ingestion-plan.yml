# Auxiliary real-data workflow. Canonical policy: .github/workflows/real-data-complete-execution.yml
name: Real Seed Ingestion Plan
on:
  workflow_dispatch: null
  pull_request:
    paths:
    - data/real/bootstrap/real_observational_seed_v*.csv
    - data/real/orbital_dynamics/orbital_shape_angular_momentum_seed_v1.csv
    - data/real/bootstrap/real_seed_pipeline_orchestration.yml
    - scripts/data_scan/build_real_seed_ingestion_plan.py
    - .github/workflows/real-seed-ingestion-plan.yml
  push:
    paths:
    - data/real/bootstrap/real_observational_seed_v*.csv
    - data/real/orbital_dynamics/orbital_shape_angular_momentum_seed_v1.csv
    - data/real/bootstrap/real_seed_pipeline_orchestration.yml
    - scripts/data_scan/build_real_seed_ingestion_plan.py
    - .github/workflows/real-seed-ingestion-plan.yml
permissions:
  contents: read
concurrency:
  group: real-seed-ingestion-plan-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build-real-seed-ingestion-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Show repository state
      run: 'git rev-parse HEAD

        git status --short

        '
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.x
    - name: Compile ingestion plan builder
      run: 'python -m py_compile scripts/data_scan/build_real_seed_ingestion_plan.py

        '
    - name: Build real seed ingestion plan
      run: 'python scripts/data_scan/build_real_seed_ingestion_plan.py

        '
    - name: Display ingestion plan
      run: 'cat data/results/bootstrap/real_seed_ingestion_plan.json

        echo "---"

        cat docs/science/REAL_SEED_INGESTION_PLAN.md

        '
    - name: Upload ingestion plan artifacts
      uses: actions/upload-artifact@v4
      with:
        name: real-seed-ingestion-plan
        path: 'data/results/bootstrap/real_seed_ingestion_plan.json

          data/results/bootstrap/real_seed_ingestion_plan.tsv

          docs/science/REAL_SEED_INGESTION_PLAN.md

          '
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/real-seed-ingestion-plan/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
x-canonical-real-data-policy: Auxiliary real-data workflow; canonical policy is .github/workflows/real-data-complete-execution.yml. Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.

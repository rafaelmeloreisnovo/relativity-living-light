name: Android Build

on:
  push:
    paths:
      - 'app/**'
      - 'core/lowlevel_runtime/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/wrapper/gradle-wrapper.properties'
      - 'scripts/bootstrap-gradle-wrapper.sh'
      - '.github/workflows/android-build.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'core/lowlevel_runtime/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/wrapper/gradle-wrapper.properties'
      - 'scripts/bootstrap-gradle-wrapper.sh'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_COMPILE_SDK: '35'
      ANDROID_NDK_VERSION: '27.2.12479018'
      ANDROID_CMAKE_VERSION: '3.22.1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3

      - name: Install Android build components
        run: |
          sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;35.0.0" "ndk;${ANDROID_NDK_VERSION}" "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Generate Gradle Wrapper JAR
        run: scripts/bootstrap-gradle-wrapper.sh

      - name: Build debug unsigned APK
        run: ./gradlew --no-daemon :app:assembleDebug :app:assembleValidationUnsigned

      - name: Decode release keystore
        if: ${{ secrets.RLL_RELEASE_KEYSTORE_BASE64 != '' && secrets.RLL_RELEASE_STORE_PASSWORD != '' && secrets.RLL_RELEASE_KEY_ALIAS != '' && secrets.RLL_RELEASE_KEY_PASSWORD != '' }}
        run: |
          mkdir -p "$RUNNER_TEMP/rll-signing"
          printf '%s' "${{ secrets.RLL_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/rll-signing/release.jks"

      - name: Build signed release APK and AAB
        if: ${{ secrets.RLL_RELEASE_KEYSTORE_BASE64 != '' && secrets.RLL_RELEASE_STORE_PASSWORD != '' && secrets.RLL_RELEASE_KEY_ALIAS != '' && secrets.RLL_RELEASE_KEY_PASSWORD != '' }}
        env:
          RLL_RELEASE_STORE_FILE: ${{ runner.temp }}/rll-signing/release.jks
          RLL_RELEASE_STORE_PASSWORD: ${{ secrets.RLL_RELEASE_STORE_PASSWORD }}
          RLL_RELEASE_KEY_ALIAS: ${{ secrets.RLL_RELEASE_KEY_ALIAS }}
          RLL_RELEASE_KEY_PASSWORD: ${{ secrets.RLL_RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: rll-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload validation unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: rll-validation-unsigned-apk
          path: app/build/outputs/apk/validationUnsigned/*.apk
          if-no-files-found: error

      - name: Upload signed release APK
        if: ${{ secrets.RLL_RELEASE_KEYSTORE_BASE64 != '' && secrets.RLL_RELEASE_STORE_PASSWORD != '' && secrets.RLL_RELEASE_KEY_ALIAS != '' && secrets.RLL_RELEASE_KEY_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: rll-release-apk-signed
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload signed release AAB
        if: ${{ secrets.RLL_RELEASE_KEYSTORE_BASE64 != '' && secrets.RLL_RELEASE_STORE_PASSWORD != '' && secrets.RLL_RELEASE_KEY_ALIAS != '' && secrets.RLL_RELEASE_KEY_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: rll-release-aab-signed
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

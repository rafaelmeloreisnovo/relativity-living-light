name: Validate Schema Contracts

on:
  pull_request:
    paths:
      - "schemas/**"
      - "tools/validate_schemas_claim_boundary.py"
      - "tests/test_schemas_claim_boundary.py"
      - ".github/workflows/validate-schema-contracts.yml"
  push:
    branches: [main]
    paths:
      - "schemas/**"
      - "tools/validate_schemas_claim_boundary.py"
      - "tests/test_schemas_claim_boundary.py"
      - ".github/workflows/validate-schema-contracts.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-schema-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate root schema claim boundaries
        run: python tools/validate_schemas_claim_boundary.py
      - name: Run schema validator tests
        run: python -m pytest -q tests/test_schemas_claim_boundary.py

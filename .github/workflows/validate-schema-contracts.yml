name: Validate Schema Contracts

on:
  pull_request:
    paths:
      - "schemas/**"
      - "fixtures/ambient_field_observation.example.json"
      - "scripts/validate_omega_schemas.py"
      - "scripts/validate_semantic_governance_schemas.py"
      - "scripts/validate_ambient_field_observation.py"
      - "tools/validate_schemas_claim_boundary.py"
      - "tests/test_schemas_claim_boundary.py"
      - "tests/test_semantic_governance_schemas.py"
      - ".github/workflows/validate-schema-contracts.yml"
  push:
    branches: [main]
    paths:
      - "schemas/**"
      - "fixtures/ambient_field_observation.example.json"
      - "scripts/validate_omega_schemas.py"
      - "scripts/validate_semantic_governance_schemas.py"
      - "scripts/validate_ambient_field_observation.py"
      - "tools/validate_schemas_claim_boundary.py"
      - "tests/test_schemas_claim_boundary.py"
      - "tests/test_semantic_governance_schemas.py"
      - ".github/workflows/validate-schema-contracts.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-schema-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: pip install pytest
      - name: Validate root schema claim boundaries
        run: python tools/validate_schemas_claim_boundary.py
      - name: Validate RAFAELIA Omega schema layer
        run: python scripts/validate_omega_schemas.py
      - name: Validate semantic-governance 7D schema layer
        run: python scripts/validate_semantic_governance_schemas.py
      - name: Validate ambient-field observation contract
        run: python scripts/validate_ambient_field_observation.py
      - name: Run schema validator tests
        run: >-
          python -m pytest -q
          tests/test_schemas_claim_boundary.py
          tests/test_semantic_governance_schemas.py

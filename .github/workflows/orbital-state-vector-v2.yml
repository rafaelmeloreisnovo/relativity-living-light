# Auxiliary real-data workflow. Canonical policy: .github/workflows/real-data-complete-execution.yml
name: Orbital State Vector V2
on:
  workflow_dispatch: null
  pull_request:
    paths:
    - data/real/orbital_dynamics/orbital_shape_angular_momentum_seed_v1.csv
    - scripts/data_scan/fetch_horizons_mars_state_vector.py
    - scripts/validation/validate_orbital_state_vector_v2.py
    - .github/workflows/orbital-state-vector-v2.yml
  push:
    paths:
    - data/real/orbital_dynamics/orbital_shape_angular_momentum_seed_v1.csv
    - scripts/data_scan/fetch_horizons_mars_state_vector.py
    - scripts/validation/validate_orbital_state_vector_v2.py
    - .github/workflows/orbital-state-vector-v2.yml
permissions:
  contents: read
concurrency:
  group: orbital-state-vector-v2-${{ github.ref }}
  cancel-in-progress: false
jobs:
  orbital-state-vector-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.x
    - name: Compile scripts
      run: 'python -m py_compile scripts/data_scan/fetch_horizons_mars_state_vector.py

        python -m py_compile scripts/validation/validate_orbital_state_vector_v2.py

        '
    - name: Fetch Horizons Mars vectors
      run: 'python scripts/data_scan/fetch_horizons_mars_state_vector.py

        '
    - name: Validate orbital state-vector v2
      run: 'python scripts/validation/validate_orbital_state_vector_v2.py

        '
    - name: Display orbital v2 report
      run: 'cat docs/science/ORBITAL_STATE_VECTOR_V2_REPORT.md

        '
    - name: Upload orbital state-vector v2 artifacts
      uses: actions/upload-artifact@v4
      with:
        name: orbital-state-vector-v2
        path: 'data/raw/orbital_dynamics/ephemerides/jpl_horizons_mars_vectors_2006_sample.csv

          data/raw/orbital_dynamics/ephemerides/jpl_horizons_mars_vectors_2006_sample.meta.yml

          data/results/orbital_dynamics/orbital_state_vector_v2_validation.json

          docs/science/ORBITAL_STATE_VECTOR_V2_REPORT.md

          '
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/orbital-state-vector-v2/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
x-canonical-real-data-policy: Auxiliary real-data workflow; canonical policy is .github/workflows/real-data-complete-execution.yml. Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.

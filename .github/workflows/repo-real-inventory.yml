name: repo-real-inventory

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/DOCUMENTATION_FULL_INVENTORY.md'
      - 'docs/REAL_NUMBERS_REPORT.md'
      - 'docs/YML_WORKFLOWS_INDEX.md'
      - 'data/results/repo_inventory.json'
      - 'data/results/repo_inventory.tsv'
      - 'data/results/repo_inventory_summary.json'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate real inventory from canonical tool
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/docs_inventory.py

      - name: Build inventory checksums and commit policy note
        shell: bash
        run: |
          set -euo pipefail
          sha256sum docs/DOCUMENTATION_FULL_INVENTORY.md docs/REAL_NUMBERS_REPORT.md docs/YML_WORKFLOWS_INDEX.md data/results/repo_inventory.json data/results/repo_inventory.tsv data/results/repo_inventory_summary.json > data/results/repo_inventory_checksums.sha256
          printf '%s\n' "This workflow is artifact-only. Commit inventory updates through a reviewed pull request, not an automatic push." > data/results/repo_inventory_commit_policy.txt

      - name: Upload generated inventory artifact without committing
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repo-real-inventory-${{ github.run_id }}
          path: |
            docs/DOCUMENTATION_FULL_INVENTORY.md
            docs/REAL_NUMBERS_REPORT.md
            docs/YML_WORKFLOWS_INDEX.md
            data/results/repo_inventory.json
            data/results/repo_inventory.tsv
            data/results/repo_inventory_summary.json
            data/results/repo_inventory_checksums.sha256
            data/results/repo_inventory_commit_policy.txt
          retention-days: 14

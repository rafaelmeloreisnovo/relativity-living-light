name: Convention Consistency Check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  check-conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check structure_d required outputs
        run: bash scripts/check_structure_d_required_outputs.sh
      - name: Check structure_d dataset/model coverage
        run: bash scripts/check_structure_d_model_dataset_coverage.sh
      - name: Validate canonical convention consistency
        run: scripts/check_convention_conflicts.sh
      - name: Check documentation inventory count consistency
        run: python3 tools/docs_inventory.py --check

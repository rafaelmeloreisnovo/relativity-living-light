name: Convention Consistency Check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  check-conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check structure_d required outputs
        run: bash scripts/check_structure_d_required_outputs.sh
      - name: Validate canonical convention consistency
        run: scripts/check_convention_conflicts.sh

territorio:
  antes:
    objetivo: "Separar narrativa, evidência e hipótese."
    pergunta_raiz: "A Via Láctea está em um halo esférico simples ou em uma estrutura local achatada de matéria escura?"
    resposta_curta:
      - "A notícia fala em 'boiando', mas o correto é: o Grupo Local parece estar embutido em uma distribuição plana/sheet-like de massa escura."
      - "O artigo resolve uma tensão local: como o fluxo de Hubble perto do Grupo Local permanece calmo apesar da massa da Via Láctea + Andrômeda."
    invariantes:
      - "Grupo Local = Via Láctea + Andrômeda + satélites."
      - "Matéria escura é inferida por gravidade, não vista diretamente."
      - "Movimentos de galáxias próximas são os traçadores."
    ruido_a_transmutar:
      - entrada: "boiando em camada"
        saida: "embutida em lâmina/folha gravitacional de massa escura"
      - entrada: "prova contra ΛCDM"
        saida: "resultado compatível com ΛCDM em simulações restringidas"
      - entrada: "halo desapareceu"
        saida: "halo galáctico continua; o novo nível é a geometria extra-local do Grupo Local"

  durante:
    objetivo: "Cruzar a descoberta com RLL sem inflar a conclusão."
    leitura_cientifica:
      metodo:
        - "Simulações ΛCDM com condições iniciais restringidas por BORG."
        - "169 ressimulações Gadget-4."
        - "Traçadores: 31 galáxias isoladas fora do Grupo Local."
        - "Alvos: massas, posições e velocidades de Via Láctea, M31 e fluxo local."
      achados:
        - "A massa ao redor do Grupo Local é mais sheet-like que esférica."
        - "A concentração planar se estende até ~10 Mpc."
        - "Há voids profundos acima e abaixo do plano."
        - "A geometria explica o fluxo de Hubble local calmo e anisotrópico."
        - "Modelos esféricos de infall falham frente à anisotropia."
    traducao_RLL:
      variaveis_sugeridas:
        - nome: "S_sheet"
          significado: "força/índice de achatamento da distribuição de massa local"
        - nome: "A_LG"
          significado: "anisotropia do fluxo local em torno do Grupo Local"
        - nome: "rho_plane_over_mean"
          significado: "densidade do plano dividida pela densidade cósmica média"
        - nome: "void_contrast"
          significado: "contraste de subdensidade acima/abaixo da lâmina"
        - nome: "theta_local_sheet"
          significado: "alinhamento angular com Local Sheet / Supergalactic Plane"
      encaixe_no_modelo:
        - "RLL não deve usar isso como prova direta de energia escura."
        - "O achado serve como teste de geometria local, anisotropia e reconstrução de massa."
        - "Adicionar uma camada f(z, theta, phi) pode tornar RLL comparável a anisotropias observacionais."
        - "A descoberta conversa com seu eixo de topologia dinâmica: massa local não é esfera simples; é geometria efetiva."

  depois:
    objetivo: "Transformar a notícia em módulo de paper, pipeline e tese."
    acoes:
      - id: "D1"
        nome: "Criar seção no paper"
        titulo_sugerido: "Local Group dark-matter sheet as an anisotropic boundary condition"
        saida: "texto acadêmico de 800-1200 palavras"
      - id: "D2"
        nome: "Criar métrica RLL"
        formula_sugerida: "A_sheet = 1 - c/a"
        observacao: "usar c/a, b/a e c/b do artigo como comparação geométrica"
      - id: "D3"
        nome: "Adicionar teste falsificável"
        teste: "RLL deve reproduzir fluxo local anisotrópico sem piorar BAO/SNe/CMB."
      - id: "D4"
        nome: "Conectar com Euclid/DESI"
        teste: "comparar crescimento de estrutura e anisotropias locais em lensing/catálogo de galáxias"
      - id: "D5"
        nome: "Separar divulgação e paper"
        regra: "metáfora no texto público; equação e estatística no paper."

respostas:
  antes:
    texto: >
      Antes da leitura técnica, a notícia deve ser entendida como divulgação: ela traduz uma distribuição
      gravitacional achatada de matéria escura em torno do Grupo Local como se fosse uma 'camada' onde
      a Via Láctea estaria boiando. A formulação científica correta é que a massa inferida ao redor da
      Via Láctea e de Andrômeda parece concentrar-se em uma estrutura planar de larga escala, com vazios
      acima e abaixo.
  durante:
    texto: >
      Durante a validação, a âncora não é a manchete; é o artigo Nature Astronomy. O estudo usa simulações
      ΛCDM restringidas, reconstrução Bayesiana e 169 realizações para mostrar que a geometria local precisa
      ser anisotrópica/sheet-like para reconciliar a massa do Grupo Local com o fluxo de Hubble calmo observado
      em galáxias próximas.
  depois:
    texto: >
      Depois do cruzamento, o uso correto no RLL é como módulo de anisotropia e condição de contorno local:
      não como prova contra ΛCDM, mas como oportunidade de testar se o formalismo RLL consegue representar
      geometria, fluxo, matéria escura e voids em uma métrica única, comparável a dados reais.

hipoteses_RLL:
  H1:
    nome: "Geometria local como campo efetivo"
    enunciado: "A lâmina de matéria escura pode ser modelada como uma condição de contorno anisotrópica para o setor escuro local."
    status: "testavel"
  H2:
    nome: "RLL anisotrópico"
    enunciado: "Uma extensão f(z, theta, phi) pode capturar sinais de sheet/void sem destruir a consistência com BAO/SNe."
    status: "em_aberto"
  H0:
    nome: "ΛCDM suficiente"
    enunciado: "O fenômeno é totalmente explicado por ΛCDM com geometria local não esférica."
    status: "posição do artigo"

metricas:
  geometria:
    - "c/a: razão eixo menor/eixo maior; baixo valor indica achatamento"
    - "b/a: razão eixo intermediário/eixo maior"
    - "c/b: distingue lâmina de filamento"
  fluxo:
    - "sigma_v: dispersão do fluxo local"
    - "v_radial(R,z): campo de velocidade peculiar"
    - "delta_H_local: desvio local da lei de Hubble"
  densidade:
    - "rho/rho_bar no plano"
    - "rho/rho_bar nos voids"
    - "surface_density_sheet(R)"


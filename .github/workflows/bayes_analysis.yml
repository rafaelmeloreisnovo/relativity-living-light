name: Análise Bayesiana RLL vs ΛCDM

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
    paths:
      - .github/workflows/bayes_analysis.yml
      - src/**
      - data/**
      - validation/**
      - requirements*.txt
      - pyproject.toml
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-bayes:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib emcee dynesty tqdm

      - name: Executar pipeline Bayesiano
        run: python src/run_full_analysis.py

      - name: Upload dos artefatos
        uses: actions/upload-artifact@v4
        with:
          name: resultados-bayesianos
          path: |
            data/bayes_result.json
            figs/model_comparison.png
            figs/posterior_epsilon.png
          if-no-files-found: error
          retention-days: 30

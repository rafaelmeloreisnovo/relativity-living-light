name: Análise Bayesiana RLL vs ΛCDM

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  schedule:
    # Executa toda semana para verificar invariância temporal
    - cron: '0 0 * * 0'

jobs:
  run-bayes:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # tempo máximo para evitar travamentos

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'   # cacheia as dependências

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib emcee dynesty

      - name: Executar pipeline Bayesiano
        run: python src/run_full_analysis.py

      - name: Upload dos artefatos
        uses: actions/upload-artifact@v4
        with:
          name: resultados-bayesianos
          path: |
            data/bayes_result.json
            figs/model_comparison.png
            figs/posterior_epsilon.png
          if-no-files-found: error
          retention-days: 30

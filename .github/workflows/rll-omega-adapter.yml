name: RLL Omega residual adapter

on:
  pull_request:
    paths:
      - "src/rll_photonic/**"
      - "scripts/rll_omega_residual_audit.py"
      - "tests/test_omega_adapter.py"
      - "tests/test_rll_omega_residual_audit.py"
      - "schemas/rll_omega_residual_input.schema.json"
      - "examples/rll_omega_residual_example.json"
      - ".github/workflows/rll-omega-adapter.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rll-omega-adapter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile implementation
        run: |
          python -m py_compile src/rll_photonic/omega_adapter.py
          python -m py_compile scripts/rll_omega_residual_audit.py

      - name: Run adapter tests
        run: python -m unittest discover -s tests -p "test_omega_adapter.py" -v

      - name: Run executable audit tests
        run: python -m unittest discover -s tests -p "test_rll_omega_residual_audit.py" -v

      - name: Execute synthetic fixture
        run: |
          mkdir -p artifacts
          python scripts/rll_omega_residual_audit.py \
            examples/rll_omega_residual_example.json \
            --strict \
            --output artifacts/rll_omega_residual_audit.json

      - name: Publish claim boundary
        if: always()
        run: |
          {
            echo "# RLL Omega adapter"
            echo
            echo "- Unit tests: 10 synthetic checks"
            echo "- Fixture: synthetic and dimensionless"
            echo "- Promotion boundary: residual classification is not RLL validation or new physics"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rll-omega-residual-${{ github.run_id }}
          path: artifacts/rll_omega_residual_audit.json
          if-no-files-found: error
          retention-days: 14

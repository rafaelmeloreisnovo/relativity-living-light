# Auxiliary real-data workflow. Canonical policy: .github/workflows/real-data-complete-execution.yml
name: Six Sigma Real Data Controls
on:
  pull_request:
    paths:
    - docs/operations/**
    - docs/real_data/**
    - docs/governance/**
    - tools/validate_six_sigma_real_data_controls.py
    - .github/workflows/six-sigma-real-data-controls.yml
  push:
    paths:
    - docs/operations/**
    - docs/real_data/**
    - docs/governance/**
    - tools/validate_six_sigma_real_data_controls.py
    - .github/workflows/six-sigma-real-data-controls.yml
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: six-sigma-real-data-controls-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  six-sigma-real-data-controls:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Validate Six Sigma real-data controls
      run: python tools/validate_six_sigma_real_data_controls.py
    - name: Check documentation inventory
      run: python3 tools/docs_inventory.py --check
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/six-sigma-real-data-controls/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    - name: Upload canonical real-data policy artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: six-sigma-real-data-controls-policy-${{ github.run_id }}-${{ github.job }}
        path: artifacts/workflow-policy/six-sigma-real-data-controls/${{ github.job }}/
        retention-days: '14'
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
x-canonical-real-data-policy: Auxiliary real-data workflow; canonical policy is .github/workflows/real-data-complete-execution.yml. Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.

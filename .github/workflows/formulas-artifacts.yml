name: formulas-artifacts

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-formulas-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate formula artifacts from docs and legacy markdown
        run: |
          python tools/formula_artifact_builder.py --root . --outdir artifacts/formulas

      - name: Upload formulas artifacts
        uses: actions/upload-artifact@v4
        with:
          name: formulas-artifacts
          path: artifacts/formulas
          if-no-files-found: error

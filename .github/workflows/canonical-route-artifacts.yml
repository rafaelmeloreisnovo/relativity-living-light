# Auxiliary real-data workflow. Canonical policy: .github/workflows/real-data-complete-execution.yml
name: Canonical Route Artifacts
on:
  workflow_dispatch:
    inputs:
      export_mode:
        description: 'Export mode: combined, separated, or both'
        required: true
        default: both
        type: choice
        options:
        - combined
        - separated
        - both
  push:
    paths:
    - data/real/bootstrap/canonical_route_checklist.yml
    - docs/science/CANONICAL_ROUTE_CHECKLIST.md
    - .github/workflows/canonical-route-artifacts.yml
  pull_request:
    paths:
    - data/real/bootstrap/canonical_route_checklist.yml
    - docs/science/CANONICAL_ROUTE_CHECKLIST.md
    - .github/workflows/canonical-route-artifacts.yml
permissions:
  contents: read
concurrency:
  group: canonical-route-artifacts-${{ github.ref }}
  cancel-in-progress: false
jobs:
  combined-artifact:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.export_mode == 'combined' || inputs.export_mode == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Upload combined canonical artifact bundle
      uses: actions/upload-artifact@v4
      with:
        name: canonical-route-artifacts
        path: 'data/real/bootstrap/canonical_route_checklist.yml

          docs/science/CANONICAL_ROUTE_CHECKLIST.md

          docs/science/TACTICAL_ROUTE_ORCHESTRATOR.md

          docs/science/ROUTE_DEFIBRILLATION_POLICY.md

          docs/science/PEER_REVIEW_READINESS_STATUS.md

          docs/science/ROADMAP_NEXT_ACTIONS.md

          data/raw/RAW_DATA_MANIFEST.yml

          data/results/bootstrap/raw_data_manifest_status.json

          data/results/bootstrap/raw_data_manifest_status.tsv

          docs/science/RAW_DATA_MANIFEST_STATUS.md

          data/real/orbital_dynamics/orbital_shape_angular_momentum_seed_v1.csv

          data/raw/orbital_dynamics/ephemerides/jpl_horizons_mars_vectors_2006_sample.csv

          data/raw/orbital_dynamics/ephemerides/jpl_horizons_mars_vectors_2006_sample.meta.yml

          data/results/orbital_dynamics/orbital_state_vector_v2_validation.json

          docs/science/ORBITAL_STATE_VECTOR_V2_REPORT.md

          '
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/canonical-route-artifacts/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
  separated-artifacts:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.export_mode == 'separated' || inputs.export_mode == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Upload checklist artifact
      uses: actions/upload-artifact@v4
      with:
        name: route-artifact-checklist
        path: 'data/real/bootstrap/canonical_route_checklist.yml

          docs/science/CANONICAL_ROUTE_CHECKLIST.md

          '
    - name: Upload raw custody artifact
      uses: actions/upload-artifact@v4
      with:
        name: route-artifact-raw-custody
        path: 'data/raw/RAW_DATA_MANIFEST.yml

          data/results/bootstrap/raw_data_manifest_status.json

          data/results/bootstrap/raw_data_manifest_status.tsv

          docs/science/RAW_DATA_MANIFEST_STATUS.md

          docs/science/RAW_DATA_MANIFEST_GUIDE.md

          '
    - name: Upload orbital v2 artifact
      uses: actions/upload-artifact@v4
      with:
        name: route-artifact-orbital-v2
        path: 'data/real/orbital_dynamics/orbital_shape_angular_momentum_seed_v1.csv

          data/raw/orbital_dynamics/ephemerides/jpl_horizons_mars_vectors_2006_sample.csv

          data/raw/orbital_dynamics/ephemerides/jpl_horizons_mars_vectors_2006_sample.meta.yml

          data/results/orbital_dynamics/orbital_state_vector_v2_validation.json

          docs/science/ORBITAL_STATE_VECTOR_V2_REPORT.md

          '
    - name: Upload orchestration docs artifact
      uses: actions/upload-artifact@v4
      with:
        name: route-artifact-orchestration-docs
        path: 'docs/science/TACTICAL_ROUTE_ORCHESTRATOR.md

          docs/science/ROUTE_DEFIBRILLATION_POLICY.md

          docs/science/PEER_REVIEW_READINESS_STATUS.md

          docs/science/ROADMAP_NEXT_ACTIONS.md

          '
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/canonical-route-artifacts/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
x-canonical-real-data-policy: Auxiliary real-data workflow; canonical policy is .github/workflows/real-data-complete-execution.yml. Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.

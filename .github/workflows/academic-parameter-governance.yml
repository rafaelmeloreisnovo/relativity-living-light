name: Academic Parameter Governance

on:
  push:
    paths:
      - 'data/inputs/cosmology_joint/parameter_origin_registry.json'
      - 'tools/validate_academic_parameter_registry.py'
      - 'docs/RLL_ACADEMIC_PARAMETER_CONVERGENCE_LEDGER.md'
      - 'docs/RLL_OPERATIONAL_EXCELLENCE_ACADEMIC_STRATEGY.md'
      - '.github/workflows/academic-parameter-governance.yml'
  pull_request:
    paths:
      - 'data/inputs/cosmology_joint/parameter_origin_registry.json'
      - 'tools/validate_academic_parameter_registry.py'
      - 'docs/RLL_ACADEMIC_PARAMETER_CONVERGENCE_LEDGER.md'
      - 'docs/RLL_OPERATIONAL_EXCELLENCE_ACADEMIC_STRATEGY.md'
      - '.github/workflows/academic-parameter-governance.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-academic-parameter-registry:
    name: Validate academic parameter registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate registry JSON and academic governance invariants
        run: python3 tools/validate_academic_parameter_registry.py

      - name: Print claim boundary reminder
        run: |
          echo "PASS: registry validated."
          echo "Reminder: this gate validates provenance and claim boundaries only."
          echo "No RLL superiority claim is allowed without fair baselines, k counting, covariance policy, and reproducible likelihood outputs."

name: RLL Book Data Pipeline

on:
  workflow_dispatch:
    inputs:
      book_scope:
        description: Bloco canônico do livro a processar
        required: true
        default: all
        type: choice
        options:
          - methodology
          - real_data
          - scripts
          - observational_validation
          - desi_boss
          - amas_mcrp
          - all
      dataset_group:
        description: Grupo de dados
        required: true
        default: all
        type: choice
        options:
          - geomagnetic
          - heliophysics
          - cosmology
          - all
      mode:
        description: Modo operacional
        required: true
        default: metadata_only
        type: choice
        options:
          - metadata_only
          - dry_run
          - fetch
          - compute
      flush_artifact:
        description: Limpar artifacts/rll-pipeline antes da execução
        required: true
        default: true
        type: boolean
      commit_artifacts:
        description: Commitar apenas manifestos/resultados leves em results/pipeline-runs/<run_id> por opt-in explícito
        required: true
        default: false
        type: boolean
      retention_days:
        description: Retenção do artifact
        required: true
        default: '14'
        type: choice
        options: ['7', '14', '30', '90']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare artifact directory
        run: |
          if [ "${{ inputs.flush_artifact }}" = "true" ]; then
            rm -rf artifacts/rll-pipeline
          fi
          mkdir -p artifacts/rll-pipeline

      - name: Docs inventory
        run: |
          python3 tools/docs_inventory.py
          python3 tools/docs_inventory.py --check

      - name: Run canonical pipeline
        run: |
          python3 scripts/rll_pipeline.py \
            --book-scope "${{ inputs.book_scope }}" \
            --dataset-group "${{ inputs.dataset_group }}" \
            --mode "${{ inputs.mode }}" \
            --output-dir artifacts/rll-pipeline

      - name: Runtime files + checksums
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > artifacts/rll-pipeline/RUN_UTC.txt
          echo "${GITHUB_SHA}" > artifacts/rll-pipeline/COMMIT_SHA.txt
          printf '%s\n' "Commit is opt-in only via separate write-permission job; artifact upload is the default output." > artifacts/rll-pipeline/COMMIT_POLICY.txt
          (cd artifacts/rll-pipeline && find . -type f ! -name CHECKSUMS.sha256 -print0 | sort -z | xargs -0 sha256sum) > artifacts/rll-pipeline/CHECKSUMS.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rll-book-pipeline-${{ github.run_id }}-${{ inputs.book_scope }}-${{ inputs.dataset_group }}-${{ inputs.mode }}
          path: artifacts/rll-pipeline/
          retention-days: ${{ fromJSON(inputs.retention_days) }}

  commit-lightweight-artifacts:
    needs: pipeline
    if: ${{ inputs.commit_artifacts }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout for explicit opt-in commit
        uses: actions/checkout@v4

      - name: Download book pipeline artifact
        uses: actions/download-artifact@v4
        with:
          name: rll-book-pipeline-${{ github.run_id }}-${{ inputs.book_scope }}-${{ inputs.dataset_group }}-${{ inputs.mode }}
          path: artifacts/rll-pipeline

      - name: Commit lightweight artifacts
        run: |
          set -euo pipefail
          RUN_DIR="results/pipeline-runs/${{ github.run_id }}"
          mkdir -p "${RUN_DIR}"
          rsync -av --prune-empty-dirs \
            --include='*/' \
            --include='*.md' --include='*.json' --include='*.txt' --include='*.sha256' \
            --exclude='*' \
            artifacts/rll-pipeline/ "${RUN_DIR}/"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${RUN_DIR}"
          if git diff --cached --quiet; then
            echo "No lightweight changes to commit."
            exit 0
          fi
          git commit -m "ci(rll-book): artifacts run ${{ github.run_id }} (${{ inputs.book_scope }}/${{ inputs.dataset_group }}/${{ inputs.mode }})"
          git push

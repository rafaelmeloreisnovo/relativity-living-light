# Auxiliary real-data workflow. Canonical policy: .github/workflows/real-data-complete-execution.yml
name: RLL Book Data Pipeline
on:
  workflow_dispatch:
    inputs:
      book_scope:
        description: "Bloco can\xF4nico do livro a processar"
        required: true
        default: all
        type: choice
        options:
        - methodology
        - real_data
        - scripts
        - observational_validation
        - desi_boss
        - amas_mcrp
        - all
      dataset_group:
        description: Grupo de dados
        required: true
        default: all
        type: choice
        options:
        - geomagnetic
        - heliophysics
        - cosmology
        - all
      mode:
        description: Modo operacional
        required: true
        default: metadata_only
        type: choice
        options:
        - metadata_only
        - dry_run
        - fetch
        - compute
      flush_artifact:
        description: "Limpar artifacts/rll-pipeline antes da execu\xE7\xE3o"
        required: true
        default: true
        type: boolean
      commit_artifacts:
        description: "Commitar apenas manifestos/resultados leves em results/pipeline-runs/<run_id> por opt-in expl\xEDcito"
        required: true
        default: false
        type: boolean
      retention_days:
        description: "Reten\xE7\xE3o do artifact"
        required: true
        default: '14'
        type: choice
        options:
        - '7'
        - '14'
        - '30'
        - '90'
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Prepare artifact directory
      run: "if [ \"${{ inputs.flush_artifact }}\" = \"true\" ]; then\n  rm -rf artifacts/rll-pipeline\nfi\nmkdir -p artifacts/rll-pipeline\n"
    - name: Docs inventory
      run: 'python3 tools/docs_inventory.py

        python3 tools/docs_inventory.py --check

        '
    - name: Run canonical pipeline
      run: "python3 scripts/rll_pipeline.py \\\n  --book-scope \"${{ inputs.book_scope }}\" \\\n  --dataset-group \"${{ inputs.dataset_group }}\" \\\n  --mode \"${{ inputs.mode }}\" \\\n  --output-dir artifacts/rll-pipeline\n"
    - name: Runtime files + checksums
      run: 'date -u +"%Y-%m-%dT%H:%M:%SZ" > artifacts/rll-pipeline/RUN_UTC.txt

        echo "${GITHUB_SHA}" > artifacts/rll-pipeline/COMMIT_SHA.txt

        printf ''%s\n'' "Commit is opt-in only via separate write-permission job; artifact upload is the default output." > artifacts/rll-pipeline/COMMIT_POLICY.txt

        (cd artifacts/rll-pipeline && find . -type f ! -name CHECKSUMS.sha256 -print0 | sort -z | xargs -0 sha256sum) > artifacts/rll-pipeline/CHECKSUMS.sha256

        '
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: rll-book-pipeline-${{ github.run_id }}-${{ inputs.book_scope }}-${{ inputs.dataset_group }}-${{ inputs.mode }}
        path: artifacts/rll-pipeline/
        retention-days: ${{ fromJSON(inputs.retention_days) }}
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/rll-book-data-pipeline/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
  commit-lightweight-artifacts:
    needs: pipeline
    if: ${{ inputs.commit_artifacts }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
    - name: Checkout for explicit opt-in commit
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Download book pipeline artifact
      uses: actions/download-artifact@v4
      with:
        name: rll-book-pipeline-${{ github.run_id }}-${{ inputs.book_scope }}-${{ inputs.dataset_group }}-${{ inputs.mode }}
        path: artifacts/rll-pipeline
    - name: Commit lightweight artifacts
      run: "set -euo pipefail\nRUN_DIR=\"results/pipeline-runs/${{ github.run_id }}\"\nmkdir -p \"${RUN_DIR}\"\nrsync -av --prune-empty-dirs \\\n  --include='*/' \\\n  --include='*.md' --include='*.json' --include='*.txt' --include='*.sha256' \\\n  --exclude='*' \\\n  artifacts/rll-pipeline/ \"${RUN_DIR}/\"\ngit config user.name \"github-actions[bot]\"\ngit config user.email \"41898282+github-actions[bot]@users.noreply.github.com\"\ngit add \"${RUN_DIR}\"\nif git diff --cached --quiet; then\n  echo \"No lightweight changes to commit.\"\n  exit 0\nfi\ngit commit -m \"ci(rll-book): artifacts run ${{ github.run_id }} (${{ inputs.book_scope }}/${{ inputs.dataset_group }}/${{ inputs.mode }})\"\ngit push\n"
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/rll-book-data-pipeline/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    - name: Upload canonical real-data policy artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rll-book-data-pipeline-policy-${{ github.run_id }}-${{ github.job }}
        path: artifacts/workflow-policy/rll-book-data-pipeline/${{ github.job }}/
        retention-days: '14'
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
x-canonical-real-data-policy: Auxiliary real-data workflow; canonical policy is .github/workflows/real-data-complete-execution.yml. Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.

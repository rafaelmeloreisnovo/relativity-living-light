name: Importar dados reais

on:
  workflow_dispatch:
    inputs:
      real_data_url:
        description: 'URL da API ou arquivo (opcional — se não setado, usa SPACE_DATA_URL padrão ou secret REAL_DATA_URL)'
        required: false
  schedule:
    - cron: '0 2 * * *' # diário às 02:00 UTC (ajuste se quiser)

permissions:
  contents: write

env:
  # default public data source (não sensível) — SpaceX launches API
  SPACE_DATA_URL: "https://api.spacexdata.com/v4/launches"

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install requirements
        run: python -m pip install --upgrade pip && pip install requests pandas

      - name: Run synthetic detector (lista arquivos sintéticos)
        run: |
          python scripts/detect_synthetic.py --report-only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Importar dados reais (busca e salva em data/raw/data.json)
        id: import
        run: |
          # prioriza input, senão usa SPACE_DATA_URL, senão secret REAL_DATA_URL
          if [ -n "${{ github.event.inputs.real_data_url }}" ]; then
            export REAL_DATA_URL="${{ github.event.inputs.real_data_url }}"
          elif [ -n "${{ env.SPACE_DATA_URL }}" ]; then
            export REAL_DATA_URL="${{ env.SPACE_DATA_URL }}"
          else
            export REAL_DATA_URL="${{ secrets.REAL_DATA_URL }}"
          fi
          export REAL_DATA_API_KEY="${{ secrets.REAL_DATA_API_KEY }}"
          mkdir -p data/raw
          python scripts/import_data.py --out data/raw/data.json --url "$REAL_DATA_URL"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REAL_DATA_API_KEY: ${{ secrets.REAL_DATA_API_KEY }}

      - name: Commit and push imported data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/data.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Import: dados reais atualizados (import-data workflow)"
            git push --set-upstream origin $GITHUB_REF || git push
          else
            echo "Nenhuma mudança nos dados brutos."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

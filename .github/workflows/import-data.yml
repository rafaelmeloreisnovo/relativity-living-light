# Auxiliary real-data workflow. Canonical policy: .github/workflows/real-data-complete-execution.yml
name: "Importar dados reais \u2014 guarded audit"
on:
  workflow_dispatch:
    inputs:
      real_data_url:
        description: "URL p\xFAblica expl\xEDcita para auditoria de importa\xE7\xE3o; obrigat\xF3rio"
        required: true
      output_name:
        description: Nome do artifact gerado
        required: false
        default: raw-data-audit-sample
permissions:
  contents: read
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  import-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install requirements
      run: python -m pip install --upgrade pip && pip install requests pandas
    - name: Run synthetic detector as report-only guard
      run: "if [ -f scripts/detect_synthetic.py ]; then\n  python scripts/detect_synthetic.py --report-only\nelse\n  echo \"scripts/detect_synthetic.py not found; skipping report-only guard\"\nfi\n"
    - name: Import explicit public data URL into audit workspace
      run: "set -euo pipefail\nmkdir -p _audit/raw\npython scripts/import_data.py --out _audit/raw/data.json --url \"${{ github.event.inputs.real_data_url }}\"\npython - <<'PY'\nfrom pathlib import Path\nimport hashlib, json\np = Path('_audit/raw/data.json')\npayload = {\n    'schema': 'rll.import_data_audit_manifest.v1',\n    'source_url': '${{ github.event.inputs.real_data_url }}',\n    'artifact_path': str(p),\n    'sha256': hashlib.sha256(p.read_bytes()).hexdigest(),\n    'bytes': p.stat().st_size,\n    'claim_boundary': 'Imported audit artifact only. This workflow does not commit data and does not validate RLL, dark matter, dark energy, or cosmology claims.'\n}\nPath('_audit/raw/import_manifest.json').write_text(json.dumps(payload, indent=2) + '\\n', encoding='utf-8')\nPY\n"
    - name: Upload audit artifact without committing
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.output_name }}
        path: _audit/raw/
        if-no-files-found: error
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/import-data/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
x-canonical-real-data-policy: Auxiliary real-data workflow; canonical policy is .github/workflows/real-data-complete-execution.yml. Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.

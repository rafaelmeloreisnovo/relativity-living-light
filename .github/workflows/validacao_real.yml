# Auxiliary real-data workflow. Canonical policy: .github/workflows/real-data-complete-execution.yml
name: Validacao Real RLL
on:
  workflow_dispatch:
    inputs:
      note:
        description: Optional note for this run
        required: false
        default: manual validation run
      commit_results:
        description: Commit validation outputs back to the repository (explicit opt-in).
        required: true
        default: false
        type: boolean
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install minimal deps
      run: pip install pyyaml matplotlib
    - name: Fetch/materialize declared data anchors with explicit fallback boundary
      working-directory: validacao_real
      run: python3 fetch_real_data.py
    - name: Check fallback provenance boundary
      run: "set -euo pipefail\npython - <<'PY'\nimport json\nfrom pathlib import Path\nmanifest = json.loads(Path('validacao_real/fetched/manifest.json').read_text(encoding='utf-8'))\nboundary = manifest.get('claim_boundary', '')\nrequired = [\n    'does not validate RLL',\n    'does not prove superiority',\n    'does not replace a full likelihood',\n]\nmissing = [term for term in required if term not in boundary]\nif missing:\n    raise SystemExit(f'missing fallback claim-boundary terms: {missing}')\nfor row in manifest.get('sources', []):\n    if row.get('fallback_state') != 'committed_local_payload_not_fresh_remote_download':\n        raise SystemExit(f\"missing fallback_state for {row.get('source_id')}: {row.get('fallback_state')}\")\n    if 'claim_boundary' not in row:\n        raise SystemExit(f\"missing per-source claim boundary for {row.get('source_id')}\")\nprint('validacao_real fallback provenance boundary OK')\nPY\n"
    - name: Compute validation (chi2 / AIC / BIC / falsifiability)
      working-directory: validacao_real
      run: python3 compute_validation.py
    - name: Generate figures
      working-directory: validacao_real
      run: python3 make_figures.py
    - name: Render documentation from artifacts
      working-directory: validacao_real
      run: python3 render_report.py
    - name: Build artifact checksums
      run: 'set -euo pipefail

        find validacao_real/fetched validacao_real/results -type f -print0 | sort -z | xargs -0 -r sha256sum > validacao_real/results/CHECKSUMS.sha256

        '
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: validacao-real-artifacts
        path: 'validacao_real/fetched/

          validacao_real/results/

          '
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/validacao_real/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
  commit-results:
    needs: validate
    if: ${{ inputs.commit_results }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
    - name: Checkout for explicit opt-in commit
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Download validation artifacts
      uses: actions/download-artifact@v4
      with:
        name: validacao-real-artifacts
        path: validacao_real
    - name: Commit results back to repo only by explicit opt-in
      run: "set -euo pipefail\ngit config user.name \"github-actions[bot]\"\ngit config user.email \"41898282+github-actions[bot]@users.noreply.github.com\"\ngit add validacao_real/fetched validacao_real/results\nif git diff --cached --quiet; then\n  echo \"nothing to commit\"\n  exit 0\nfi\ngit commit -m \"validacao_real: automated opt-in run ${{ github.run_number }}\"\ngit push\n"
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/validacao_real/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    - name: Upload canonical real-data policy artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validacao_real-policy-${{ github.run_id }}-${{ github.job }}
        path: artifacts/workflow-policy/validacao_real/${{ github.job }}/
        retention-days: '14'
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
x-canonical-real-data-policy: Auxiliary real-data workflow; canonical policy is .github/workflows/real-data-complete-execution.yml. Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.

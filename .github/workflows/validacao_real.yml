name: Validacao Real RLL

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note for this run"
        required: false
        default: "manual validation run"
      commit_results:
        description: "Commit validation outputs back to the repository (explicit opt-in)."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: pip install pyyaml matplotlib

      - name: Fetch/materialize declared data anchors with explicit fallback boundary
        working-directory: validacao_real
        run: python3 fetch_real_data.py

      - name: Check fallback provenance boundary
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('validacao_real/fetched/manifest.json').read_text(encoding='utf-8'))
          boundary = manifest.get('claim_boundary', '')
          required = [
              'does not validate RLL',
              'does not prove superiority',
              'does not replace a full likelihood',
          ]
          missing = [term for term in required if term not in boundary]
          if missing:
              raise SystemExit(f'missing fallback claim-boundary terms: {missing}')
          for row in manifest.get('sources', []):
              if row.get('fallback_state') != 'committed_local_payload_not_fresh_remote_download':
                  raise SystemExit(f"missing fallback_state for {row.get('source_id')}: {row.get('fallback_state')}")
              if 'claim_boundary' not in row:
                  raise SystemExit(f"missing per-source claim boundary for {row.get('source_id')}")
          print('validacao_real fallback provenance boundary OK')
          PY

      - name: Compute validation (chi2 / AIC / BIC / falsifiability)
        working-directory: validacao_real
        run: python3 compute_validation.py

      - name: Generate figures
        working-directory: validacao_real
        run: python3 make_figures.py

      - name: Render documentation from artifacts
        working-directory: validacao_real
        run: python3 render_report.py

      - name: Build artifact checksums
        run: |
          set -euo pipefail
          find validacao_real/fetched validacao_real/results -type f -print0 | sort -z | xargs -0 -r sha256sum > validacao_real/results/CHECKSUMS.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validacao-real-artifacts
          path: |
            validacao_real/fetched/
            validacao_real/results/

  commit-results:
    needs: validate
    if: ${{ inputs.commit_results }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout for explicit opt-in commit
        uses: actions/checkout@v4

      - name: Download validation artifacts
        uses: actions/download-artifact@v4
        with:
          name: validacao-real-artifacts
          path: validacao_real

      - name: Commit results back to repo only by explicit opt-in
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add validacao_real/fetched validacao_real/results
          if git diff --cached --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "validacao_real: automated opt-in run ${{ github.run_number }}"
          git push

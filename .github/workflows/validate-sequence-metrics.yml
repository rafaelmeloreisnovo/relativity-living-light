# Auxiliary real-data workflow. Canonical policy: .github/workflows/real-data-complete-execution.yml
name: Validate sequence metrics calculator
on:
  pull_request:
    paths:
    - scripts/calculate_sequence_metrics.py
    - tests/test_calculate_sequence_metrics.py
    - data/real/evolutionary/**
    - .github/workflows/validate-sequence-metrics.yml
  push:
    branches:
    - main
    paths:
    - scripts/calculate_sequence_metrics.py
    - tests/test_calculate_sequence_metrics.py
    - data/real/evolutionary/**
    - .github/workflows/validate-sequence-metrics.yml
  workflow_dispatch: null
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate-sequence-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install test dependencies
      run: pip install pytest
    - name: Run targeted tests
      run: python -m pytest -q tests/test_calculate_sequence_metrics.py
    - name: Finalize canonical real-data policy checksums
      if: always()
      run: 'set -euo pipefail

        ARTIFACT_DIR="artifacts/workflow-policy/validate-sequence-metrics/${{ github.job }}"

        mkdir -p "$ARTIFACT_DIR"

        . tools/ci/real_data_workflow_policy.sh

        rll_real_data_write_claim_boundary "$ARTIFACT_DIR"

        rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"

        rll_real_data_write_checksums "$ARTIFACT_DIR"

        '
    - name: Upload canonical real-data policy artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validate-sequence-metrics-policy-${{ github.run_id }}-${{ github.job }}
        path: artifacts/workflow-policy/validate-sequence-metrics/${{ github.job }}/
        retention-days: '14'
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
x-canonical-real-data-policy: Auxiliary real-data workflow; canonical policy is .github/workflows/real-data-complete-execution.yml. Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.

name: YML Operational Review

on:
  pull_request:
    paths:
      - '**/*.yml'
      - '**/*.yaml'
      - 'tools/check_yml_operational_contracts.py'
      - 'tools/yml_orchestrator.py'
      - 'schemas/yml_role.schema.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yml-operational-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Run single YML orchestrator
        run: python3 tools/yml_orchestrator.py --out-dir artifacts/yml-orchestrator

      - name: Upload YML orchestrator artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yml-orchestrator-${{ github.run_id }}
          path: artifacts/yml-orchestrator/
          retention-days: 30

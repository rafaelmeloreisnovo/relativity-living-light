name: YML Operational Review

on:
  pull_request:
    paths:
      - '**/*.yml'
      - '**/*.yaml'
      - 'tools/check_yml_operational_contracts.py'
      - 'schemas/yml_role.schema.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yml-operational-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Check YML operational contracts
        run: python3 tools/check_yml_operational_contracts.py

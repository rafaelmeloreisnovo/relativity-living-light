# CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
# CLAIM_BOUNDARY: This workflow generates structural comparison artifacts only. A synthetic/demo fallback validates plumbing and never counts as real observational evidence.
name: RLL Balance Report

on:
  workflow_dispatch:
    inputs:
      input_json:
        description: "Path to JSON metrics file"
        required: false
        default: "artifacts/joint_real_likelihood.json"
      metric:
        description: "Decision metric: bic, aicc, aic, chi2, evidence, bayes_factor"
        required: false
        default: "bic"
  push:
    paths:
      - "scripts/rll_balance_report.py"
      - "docs/livro_vivo_bridge/RLL_BALANCE_SCRIPT_USAGE.md"
      - ".github/workflows/rll-balance-report.yml"
      - "**/*likelihood*.json"
      - "**/*model*.json"
      - "**/*balance*.json"
  pull_request:
    paths:
      - "scripts/rll_balance_report.py"
      - "docs/livro_vivo_bridge/RLL_BALANCE_SCRIPT_USAGE.md"
      - ".github/workflows/rll-balance-report.yml"

permissions:
  contents: read

jobs:
  balance-report:
    name: Generate RLL balance report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare input JSON
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          INPUT_JSON="${{ github.event.inputs.input_json || 'artifacts/joint_real_likelihood.json' }}"
          METRIC="${{ github.event.inputs.metric || 'bic' }}"

          mkdir -p artifacts/rll_balance

          if [ -f "$INPUT_JSON" ]; then
            echo "Using provided input: $INPUT_JSON"
            cp "$INPUT_JSON" artifacts/rll_balance/input.json
            echo "source_kind=provided" >> "$GITHUB_OUTPUT"
          else
            echo "Input JSON not found: $INPUT_JSON"
            echo "Creating a synthetic demo fixture only to validate workflow plumbing."
            cat > artifacts/rll_balance/input.json <<'JSON'
          {
            "RLL":  {"chi2": 84.4824, "aicc": 103.1006, "bic": 117.7535},
            "LCDM": {"chi2": 84.4824, "aicc": 95.5169,  "bic": 105.2768},
            "wCDM": {"chi2": 83.7104, "aicc": 97.1841,  "bic": 108.6637},
            "CPL":  {"chi2": 62.0717, "aicc": 78.0717,  "bic": 91.1839}
          }
          JSON
            echo "source_kind=synthetic_demo" >> "$GITHUB_OUTPUT"
          fi

          echo "metric=$METRIC" >> "$GITHUB_OUTPUT"

      - name: Run balance report
        shell: bash
        run: |
          set -euo pipefail
          python scripts/rll_balance_report.py \
            --input artifacts/rll_balance/input.json \
            --output-md artifacts/rll_balance/rll_balance_report.md \
            --output-json artifacts/rll_balance/rll_balance_report.json \
            --metric "${{ steps.prepare.outputs.metric }}"

      - name: Write claim boundary and checksums
        shell: bash
        run: |
          set -euo pipefail
          cat > artifacts/rll_balance/CLAIM_BOUNDARY.md <<EOF
          # Claim Boundary

          - source_kind: ${{ steps.prepare.outputs.source_kind }}
          - canonical_real_data_workflow: .github/workflows/real-data-complete-execution.yml
          - this workflow compares supplied metrics and emits structural artifacts;
          - a synthetic/demo/mock/fixture fallback is plumbing evidence only;
          - no artifact from a synthetic fallback validates a scientific claim.
          EOF

          (
            cd artifacts/rll_balance
            find . -type f ! -name 'CHECKSUMS.sha256' -print0 \
              | sort -z \
              | while IFS= read -r -d '' file; do sha256sum "$file"; done \
              > CHECKSUMS.sha256
            test -s CHECKSUMS.sha256
            sha256sum -c CHECKSUMS.sha256
          )

      - name: Show report summary
        shell: bash
        run: |
          set -euo pipefail
          sed -n '1,120p' artifacts/rll_balance/rll_balance_report.md
          echo "--- CLAIM BOUNDARY ---"
          cat artifacts/rll_balance/CLAIM_BOUNDARY.md
          echo "--- CHECKSUMS ---"
          cat artifacts/rll_balance/CHECKSUMS.sha256

      - name: Upload RLL balance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rll-balance-report
          path: artifacts/rll_balance/
          if-no-files-found: error

schema: rll.workflow_orchestrator.catalog.v2
profiles:
  full_session:
    description: "Run the full cross-workflow session orchestration."
    include_tags: [all]
  quick_session:
    description: "Run a compact interoperability session."
    include_tags: [core, validation]
  real_data_session:
    description: "Run only real-data related workflows."
    include_tags: [real_data, validation]

# One parent session owns execution. A stage must finish before the next stage
# is dispatched, preventing the catalog from launching every workflow at once.
execution:
  mode: sequential
  stage_barrier: true
  max_in_flight: 1

# The orchestrator discovers every executable workflow. The session workflow
# itself is intentionally excluded by the loader to prevent recursive dispatch.
workflow_files:
  - ../workflows/*.yml

workflow_catalog_dirs:
  - workflows/core
  - workflows/real_data
  - workflows/science

fetch_instructions:
  MANGA_12772:
    step1: "Acessar MaNGA DR17: https://www.sdss.org/dr17/manga/"
    step2: "Buscar plate-ifu MaNGA 12772-12704"
    step3: "Download cube FITS: rsync -av rsync://data.sdss.org/dr17/manga/spectro/redux/..."
    step4: "Calcular SHA256 e preencher checksum_sha256"
    step5: "Mover para data/real/compact_objects/manga_12772_wbh_liu_2025.fits"
  RBH1:
    step1: "JWST MAST archive: https://mast.stsci.edu/"
    step2: "Buscar program ID do van Dokkum 2025 (NIRSpec IFU)"
    step3: "Download nível 3 reductions"
    step4: "SHA256 + local_path"
  OGLE_BLG:
    step1: "HST archive: https://archive.stsci.edu/"
    step2: "Buscar OGLE-2011-BLG-0462 nas propostas Sahu/Lam"
    step3: "Download photometric + astrometric tables"

scan_requirements:

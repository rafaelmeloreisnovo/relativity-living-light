      - brightness_temp_GHz: 1.0e9
      - jet_extension_pc: 2.2
      - variability_baseline_yr: 30
    observables_required_for_rll:
      - faraday_rotation_measure_rad_m2: null
      - integrated_radio_flux_mJy: null
      - spectral_index: null
    physical_parameters:
      z: 0.017
      offset_kpc: 0.94
      M_bh_msun: null
    rll_connection:
      sector: magnetic_plasma
      omega_B0_test: true
      priority: HIGH
      rationale: >
        z=0.017 está dentro do regime de validade RLL (z_min=0.0, z_max=2.4).
        BH off-nuclear acretando lança jatos que perturbam campo B local.
        Se ΩB0·a⁻⁴ acopla com campo B de AGN off-nuclear, assinatura em

    provider: "Liu, An, Mezcua et al. 2025, Science Bulletin"
    doi: "10.1016/j.scib.2025.09.001"
    arxiv: "2509.XXXXX"
    source_url: "https://www.sciencedirect.com/science/article/pii/S2095927325008989"
    access_date_utc: "2026-06-27"
    data_type: radio_vlbi_optical_spectroscopy
    raw_data_available: false
    local_path: "data/real/compact_objects/manga_12772_wbh_liu_2025.fits"
    checksum_sha256: TOKEN_VAZIO
    z_host: 0.017
    observables_confirmed:

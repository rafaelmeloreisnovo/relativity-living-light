schema_version: "1.0"
claim_allowed: false
status: METADATA_READY_CLAIM_BLOCKED
module: wandering_black_holes_and_lensing_gaps
updated_utc: "2026-06-27"

claim_policy:
  no_superiority: true
  require_checksum: true
  require_baseline_comparison: true
  publication_language: >
    BH andante é fenômeno observacional independente do RLL.
    RLL usa esses dados para testar se o setor magnético ΩB0·a⁻⁴
    produz assinatura diferenciável de ΛCDM em ambientes de BH off-nuclear.

falsifier_global: >
  Se RLL com ΩB0>0 não produzir desvio mensurável em DM/rd ou DH/rd
  nos tracers onde BH off-nuclear é confirmado (z~0.017), o setor
  magnético é rejeitado nesse regime.


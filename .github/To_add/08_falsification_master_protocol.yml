  step1: "python3 rll_vs_lcdm.py --h0 67.4 --omega-s0 0.05 --zt 0.8 --wt 0.3 --adversary both"
  step2: "python3 src/rll/rll_perturbation_kernel.py --omega-s0 0.02 --zt 1.0 --wt 0.3"

missing_placeholder_stub_policy:
  categories:
    token_vazio:
      meaning: "Known gap intentionally protected."
      action: "Resolve only with source/artifact/baseline/checksum or keep blocked."
    placeholder:
      meaning: "Mock/example/dummy content that must not be promoted."
      action: "Replace with real fixture or label as example-only."
    stub:
      meaning: "Implementation shell or pass/NotImplemented."
      action: "Implement executable function or mark explicit TOKEN_VAZIO."
    todo_fixme:
      meaning: "Unrouted future work."
      action: "Convert to issue, ledger item, or executable test."
    aborted_forgotten:
      meaning: "Abandoned/skipped/deixado/esquecido work."
      action: "Classify as blocked, obsolete, or next artifact route."


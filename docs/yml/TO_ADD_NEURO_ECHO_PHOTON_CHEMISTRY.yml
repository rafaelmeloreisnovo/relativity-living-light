  - "MRI echo noise proves a chemical electron mechanism."
  - "Hydraulic analogy proves photon/electron chemistry."
  - "Medium chemistry validates RLL or RAFAELIA physics."
  - "Apparent echo noise growth is new physics without SNR/relaxation analysis."

safe_claims:
  - "Electrical activity can trigger and coordinate chemical signaling in neural systems through electrochemical mechanisms."
  - "Echo trains can show apparent noise growth when signal decays and noise floor remains."
  - "Medium chemistry can alter photon/electron relaxation, transfer, scattering and measured spectra."
  - "The hydraulic-column analogy is useful as a didactic model of pulsed energy storage, damping and plateau stabilization."


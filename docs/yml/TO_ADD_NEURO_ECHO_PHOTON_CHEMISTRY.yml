    - pulse_duration
    - electron_yield_or_density
    - spectrum
    - medium_composition
    - pH_or_ionic_strength
    - temperature
    - redox_state
  hydraulic_analogy:
    - pressure_pulse
    - damping
    - flow_rate
    - reservoir_or_accumulator
    - plateau_time

blocked_claims:

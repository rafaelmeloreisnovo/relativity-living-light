core_translation:
  neuro_electrochemical_trigger:
    user_language: "cérebro solta as partes elétricas para acelerar transição química"
    technical_translation: >
      In normal neurobiology, electrical activity is better framed as ionic membrane
      depolarization and voltage-gated channel control. The electrical event triggers
      chemical release mainly through Ca2+ influx and vesicle fusion, not through
      high-energy ionization of tissue.
    claim_status: "plausible_as_translation_not_new_physics"
    claim_allowed: false
  ionization_gate_boundary:
    user_language: "ionização como gatilho"
    technical_translation: >
      Use 'electrochemical gating' or 'field/voltage-triggered reaction' as the safe term.
      Reserve 'ionization' for cases with actual electron removal or ion-pair formation,
      measured by spectroscopy, radiation chemistry, plasma chemistry or electrochemistry.
    claim_status: "term_boundary_required"
    claim_allowed: false
  echo_saturation_noise:
    user_language: "leitura de ecos com saturação adequada, eco parecendo ganhar ruído"
    technical_translation: >
      In MRI/NMR-like echo trains, signal commonly decays through relaxation/dephasing
      while thermal/instrument noise remains, so apparent noise increases as SNR falls.
      Saturation, repetition timing and echo spacing can reshape contrast and apparent
      plateau/decay behavior.
    claim_status: "analogy_to_echo_train_and_snr"
    claim_allowed: false
  hydraulic_column_analogy:
    user_language: "coluna de ar em líquido/água com pressão, platô e fluxo"
    technical_translation: >
      Treat as hydraulic ram / pressure-accumulator analogy: pulsed energy, storage,
      release, damping and plateau stabilization. Useful as a didactic analogy for
      relaxation/echo stabilization, but not direct evidence for molecular mechanism.
    claim_status: "didactic_analogy_only"
    claim_allowed: false
  photon_electron_medium_chemistry:
    user_language: "foto do elétron e química do meio"
    technical_translation: >
      Photon-electron-medium coupling belongs to photochemistry, photoelectron dynamics,
      solvation, dielectric response, scattering, relaxation and radiation chemistry.
      The medium can control rate, lifetime, recombination, spectral line shape and
      measured signal through viscosity, polarity, pH, ionic strength, redox state,
      temperature and local fields.
    claim_status: "testable_frontier_mapping"
    claim_allowed: false

observables_required:
  neuro:
    - membrane_voltage_or_proxy
    - calcium_transient
    - neurotransmitter_release_timing

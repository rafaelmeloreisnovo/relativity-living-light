commit_plan:
- order: 1
  name: contract_and_schema
  intent: Add the single machine-readable articulation contract and its schema.
  files:
  - knowledge_ecosystem/session_operating_system.yml
  - schemas/session_operating_system.schema.json
  rollback: Revert only this commit; no existing scientific formula or workflow is changed.
- order: 2
  name: deterministic_validator_and_tests
  intent: Validate privacy, traceability, states, rollback paths and non-destructive execution.
  files:
  - tools/validate_session_operating_system.py
  - tests/test_session_operating_system.py
  rollback: Revert validator/test commit without altering the contract history.
- order: 3
  name: cross_repo_articulation
  intent: Link the new contract to the existing relationship registry and architecture documentation.
  files:
  - docs/audits/CROSS_REPO_RELATIONSHIP_REGISTRY.md
  - docs/architecture/SESSION_KNOWLEDGE_OPERATING_SYSTEM.md
  rollback: Revert documentation links while preserving contract and tests for audit.
- order: 4
  name: existing_workflow_binding
  intent: Extend the existing registry workflow; do not create another competing workflow.
  files:
  - .github/workflows/validate-cross-repo-relationship-registry.yml
  rollback: Revert workflow binding; validators remain runnable locally and manually.

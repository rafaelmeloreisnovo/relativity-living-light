schema: rll.session_knowledge_operating_system.v1
operation_id: RLL-KOS-20260716-001
title: Livro Vivo — articulação de sessões, conceitos, fórmulas e infraestrutura
status: AUDIT
claim_allowed: false
claim_boundary: Este contrato organiza fontes, conceitos, fórmulas, operações, evidências e destinos. Não valida integração
  cross-repo, não altera a equação cosmológica RLL, não publica conteúdo privado e não promove analogias ou hipóteses a fatos
  físicos.
execution_policy:
  entrypoint: existing_cross_repo_registry_workflow
  workflow_path: .github/workflows/validate-cross-repo-relationship-registry.yml
  trigger_policy: pull_request_or_manual
  automatic_cross_repo_write: false
  automatic_merge: false
  destructive_actions: false
  commit_results_default: false
  fail_closed_on_private_content: true
  continue_audit_after_nonfatal_gaps: true
source_policy:
  public_content:
    allowed:
    - citation
    - formula_already_public
    - source_path
    - checksum
    - test_result
    - claim_boundary
  private_content:
    content_mode: pointer_only
    allowed:
    - repository
    - path
    - commit_or_TOKEN_VAZIO
    - concept_label
    - evidence_state
    - intended_destination
    forbidden:
    - inline_private_formula
    - raw_session_text
    - secret
    - credential
    - personal_data
    - unsafe_operational_protocol
  token_vazio_policy: TOKEN_VAZIO é um estado válido quando a evidência, referência, artefato ou decisão ainda não está localizada;
    não pode ser preenchido por inferência automática.
traceability_chain:
- session_group
- source
- concept
- formula_or_model
- operation
- materialization
- artifact
- test_or_log
- evidence_state
- claim_boundary
- destination
- next_action
state_vocabulary:
- VERIFIED
- VERIFIED_LIMITED
- DECLARED_BY_AUTHOR
- HYPOTHESIS
- PARTIAL
- TOKEN_VAZIO
- CLAIM_BLOCKED
- CONTRADICTION
- ROLLBACK
organizational_metrics:
  note: Entropia e sintropia abaixo são métricas organizacionais, não grandezas termodinâmicas ou alegações físicas.
  entropy_count: TOKEN_VAZIO + CLAIM_BLOCKED + CONTRADICTION + orphan_links + policy_violations
  syntropy_count: verified_links + tested_contracts + explicit_rollbacks + source_citations
  rule: reduzir entropia sem apagar histórico, autoria, contradições ou vazios úteis

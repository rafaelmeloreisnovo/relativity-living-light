equations:
  - id: impulse_response
    equation: "y(t) = (I * h)(t) + eta(t)"
    domain: ["physics", "signal_processing", "RLL"]
    status: "core_modeling_principle"
    claim_boundary: "modeling analogy; requires dataset-specific validation"

  - id: modal_response
    equation: "h(t) = sum_k A_k exp(-gamma_k t) cos(omega_k t + phi_k)"
    domain: ["waves", "seismology", "resonance"]
    status: "known_physics"

  - id: tidal_triggering
    equation: "Delta CFS = Delta tau + mu_prime Delta sigma_n"
    domain: ["geophysics", "critical_systems"]
    status: "known_physics"
    claim_boundary: "statistical trigger, not deterministic earthquake prediction"

  - id: lyapunov_growth
    equation: "||delta x(t)|| ~= ||delta x0|| exp(lambda t)"
    domain: ["chaos", "galactic_dynamics"]
    status: "known_dynamics"

  - id: cosmic_web_graph
    equation: "G_z = (V_z, E_z, W_z)"
    domain: ["cosmology", "graph_theory", "RLL"]
    status: "modeling_representation"

  - id: density_contrast
    equation: "delta(x,z) = (rho(x,z)-rho_bar(z))/rho_bar(z)"
    domain: ["cosmology"]
    status: "known_physics"

  - id: rafaelia_coherence
    equation: "phi = (1-H)C"
    domain: ["RafaelIA", "information_metrics"]
    status: "author_model"

  - id: chi2
    equation: "chi2 = (d-m)^T C^-1 (d-m)"
    domain: ["statistics", "model_validation"]
    status: "known_statistics"

  - id: aic
    equation: "AIC = chi2 + 2k"
    domain: ["statistics", "model_selection"]
    status: "known_statistics"

  - id: bic
    equation: "BIC = chi2 + k ln(n)"
    domain: ["statistics", "model_selection"]
    status: "known_statistics"

  - id: tag14_entropy
    equation: "H_Tag14 = f(tokens, transitions, symbolic_classes, compression)"
    domain: ["RafaelIA", "information_metrics", "implementation"]
    status: "implementation_defined"
    claim_boundary: "placeholder metric; formula depends on code implementation"

  - id: toroidal_state_space
    equation: "s in [0,1)^7 ; T^7 = (R/Z)^7"
    domain: ["RafaelIA", "state_space", "topology"]
    status: "author_model"
    claim_boundary: "conceptual state representation; requires task-specific validation"
